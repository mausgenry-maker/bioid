<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BioID Pro v6.0</title>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        :root { --green: #2ecc71; --red: #e74c3c; --blue: #3498db; --grey: #555; --dark: #000; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: sans-serif; background: var(--dark); color: #fff; height: 100vh; overflow: hidden; }
        
        .screen { display: none; width: 100%; height: 100%; position: fixed; flex-direction: column; }
        .screen.active { display: flex; }

        /* Админка и Месяцы */
        .toolbar { padding: 15px; display: flex; gap: 10px; overflow-x: auto; background: #111; }
        .m-btn { padding: 8px 15px; background: #222; border-radius: 8px; font-size: 12px; white-space: nowrap; }
        .m-btn.active { background: var(--blue); }

        .admin-scroll { flex: 1; overflow-y: auto; padding: 10px; }
        .emp-card { background: #111; border-radius: 15px; padding: 15px; margin-bottom: 10px; }
        
        /* Статусы */
        .cal-grid { display: flex; gap: 5px; overflow-x: auto; padding: 10px 0; }
        .d-box { min-width: 40px; height: 40px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 11px; flex-shrink: 0; background: var(--grey); }
        .d-box.green { background: var(--green); color: #000; }
        .d-box.red { background: var(--red); }
        .d-box.yellow { background: #f1c40f; color: #000; }

        /* Терминал - Выбор действия */
        #confirm-ui { position: absolute; bottom: 5%; left: 5%; right: 5%; background: rgba(0,0,0,0.9); padding: 20px; border-radius: 20px; display: none; border: 1px solid var(--blue); text-align: center; }
        .act-btn { flex: 1; padding: 15px; border-radius: 10px; border: none; font-weight: bold; margin: 5px; }

        video { width: 100%; height: 60vh; object-fit: cover; transform: scaleX(-1); }
    </style>
</head>
<body>

    <div id="launcher" class="screen active" style="align-items:center; justify-content:center; text-align:center">
        <h1>BioID <span style="color:var(--blue)">PRO</span></h1>
        <p id="msg" style="margin: 20px 0; color:#888">ЗАГРУЗКА...</p>
        <button onclick="app.ui('user-terminal')" class="act-btn" style="background:var(--green); max-width:250px">ТЕРМИНАЛ</button>
        <button onclick="app.ui('admin-dashboard')" class="act-btn" style="background:var(--blue); max-width:250px">АДМИНКА</button>
    </div>

    <div id="user-terminal" class="screen">
        <video id="video" autoplay playsinline muted></video>
        <div id="status-text" style="text-align:center; padding:20px; font-size:20px">СКАНИРОВАНИЕ...</div>
        
        <div id="confirm-ui">
            <h2 id="user-welcome">ПРИВЕТ, ИМЯ</h2>
            <div style="display:flex; margin-top:15px">
                <button class="act-btn" style="background:var(--green)" onclick="app.confirmAction('IN')">ВХОД</button>
                <button class="act-btn" style="background:var(--red)" onclick="app.confirmAction('OUT')">ВЫХОД</button>
            </div>
            <button onclick="app.closeConfirm()" style="background:none; color:#777; border:none; margin-top:10px">ОТМЕНА</button>
        </div>
        <button onclick="location.reload()" style="position:absolute; top:10px; left:10px; padding:10px; background:#222; border-radius:5px; border:none; color:#fff">←</button>
    </div>

    <div id="admin-dashboard" class="screen">
        <div class="toolbar" id="month-picker"></div>
        <div class="admin-scroll" id="emp-list"></div>
        <button onclick="location.reload()" style="padding:15px; background:var(--blue); border:none; font-weight:bold">ВЕРНУТЬСЯ В МЕНЮ</button>
    </div>

<script>
let database;
const months = ["Январь","Февраль","Март","Апрель","Май","Июнь","Июль","Август","Сентябрь","Октябрь","Ноябрь","Декабрь"];
let currentMonth = new Date().getMonth();
let currentUser = null;

const app = {
    async init() {
        const req = indexedDB.open("BioCorporate_v6", 1);
        req.onupgradeneeded = e => {
            const d = e.target.result;
            d.createObjectStore("workers", {keyPath: "name"});
            d.createObjectStore("logs", {keyPath: "id", autoIncrement: true});
        };
        req.onsuccess = e => {
            database = e.target.result;
            this.loadModels();
        };
    },

    async loadModels() {
        const path = './models';
        await faceapi.nets.tinyFaceDetector.loadFromUri(path);
        await faceapi.nets.faceLandmark68Net.loadFromUri(path);
        await faceapi.nets.faceRecognitionNet.loadFromUri(path);
        document.getElementById('msg').innerText = "СИСТЕМА ГОТОВА";
    },

    ui(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'user-terminal') this.startCamera();
        if(id === 'admin-dashboard') this.renderAdmin();
    },

    async startCamera() {
        const v = document.getElementById('video');
        const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
        v.srcObject = s;
        this.scanLoop();
    },

    async scanLoop() {
        const v = document.getElementById('video');
        const workers = await this.getStore("workers");
        const loop = setInterval(async () => {
            if(currentUser) return; // Ждем подтверждения
            const det = await faceapi.detectSingleFace(v, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptor();
            if(det && workers.length) {
                for(let w of workers) {
                    if(faceapi.euclideanDistance(det.descriptor, new Float32Array(w.desc)) < 0.5) {
                        this.showConfirm(w);
                        break;
                    }
                }
            }
        }, 1000);
    },

    showConfirm(worker) {
        currentUser = worker;
        document.getElementById('user-welcome').innerText = worker.name;
        document.getElementById('confirm-ui').style.display = 'block';
    },

    closeConfirm() {
        currentUser = null;
        document.getElementById('confirm-ui').style.display = 'none';
    },

    async confirmAction(type) {
        const date = new Date().toISOString().split('T')[0];
        const tx = database.transaction("logs", "readwrite");
        tx.objectStore("logs").add({
            name: currentUser.name,
            date: date,
            type: type, // IN или OUT
            time: new Date().toLocaleTimeString(),
            timestamp: Date.now()
        });
        alert(type === 'IN' ? "Вход зафиксирован" : "Выход зафиксирован");
        this.closeConfirm();
    },

    async renderAdmin() {
        const picker = document.getElementById('month-picker');
        picker.innerHTML = months.map((m, i) => `
            <div class="m-btn ${i===currentMonth?'active':''}" onclick="app.setMonth(${i})">${m}</div>
        `).join('');

        const workers = await this.getStore("workers");
        const logs = await this.getStore("logs");
        const list = document.getElementById('emp-list');
        
        list.innerHTML = workers.map(w => {
            const wLogs = logs.filter(l => l.name === w.name && new Date(l.date).getMonth() === currentMonth);
            return `
                <div class="emp-card">
                    <h3>${w.name}</h3>
                    <div class="cal-grid">${this.renderDays(w.name, logs)}</div>
                    <div style="font-size:12px; color:#888; margin-top:5px">
                        ${this.calcStats(w.name, logs)}
                    </div>
                </div>
            `;
        }).join('');
    },

    setMonth(m) { currentMonth = m; this.renderAdmin(); },

    renderDays(name, logs) {
        let h = '';
        const year = new Date().getFullYear();
        const daysInMonth = new Date(year, currentMonth + 1, 0).getDate();
        
        for(let i=1; i<=daysInMonth; i++) {
            const dateStr = `${year}-${String(currentMonth+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
            const dayLogs = logs.filter(l => l.name === name && l.date === dateStr);
            
            let status = '';
            if(dayLogs.length === 0) status = '';
            else if(dayLogs.some(l => l.type === 'IN') && dayLogs.some(l => l.type === 'OUT')) status = 'green';
            else if(dayLogs.some(l => l.type === 'IN')) status = 'yellow';
            else status = 'red';

            h += `<div class="d-box ${status}" onclick="app.dayDetail('${name}', '${dateStr}')">${i}</div>`;
        }
        return h;
    },

    async dayDetail(name, date) {
        const logs = await this.getStore("logs");
        const dayLogs = logs.filter(l => l.name === name && l.date === date);
        if(!dayLogs.length) {
            if(confirm("Отметить прогул (Красный)?")) {
                database.transaction("logs","readwrite").objectStore("logs").add({name, date, type: 'ABSENT'});
                this.renderAdmin();
            }
            return;
        }
        let info = `Сотрудник: ${name}\nДата: ${date}\n\n`;
        dayLogs.forEach(l => info += `${l.type}: ${l.time}\n`);
        alert(info);
    },

    calcStats(name, logs) {
        const monthLogs = logs.filter(l => l.name === name && new Date(l.date).getMonth() === currentMonth);
        const days = [...new Set(monthLogs.map(l => l.date))].length;
        return `Рабочих дней: ${days} | Отработано: ~${days * 8}ч.`;
    },

    getStore(n) { return new Promise(r => database.transaction(n).objectStore(n).getAll().onsuccess = e => r(e.target.result)); }
};

window.onload = () => app.init();
</script>
</body>
</html>
