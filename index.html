<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BioID Corp v8.0</title>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        :root { --p: #00ff88; --bg: #000; --card: #111; --red: #ff4d4d; --blue: #00d9ff; --grey: #222; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; height: 100vh; overflow: hidden; }

        .screen { display: none; width: 100%; height: 100%; position: fixed; flex-direction: column; padding-bottom: 80px; }
        .screen.active { display: flex; }
        
        .nav { position: fixed; bottom: 0; width: 100%; height: 75px; background: #0a0a0a; display: flex; border-top: 1px solid #222; z-index: 1000; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; color: #555; }
        .nav-item.active { color: var(--p); }
        .nav-item b { font-size: 20px; margin-bottom: 2px; }

        .header { padding: 15px 20px; background: var(--card); border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; }
        .header h2 { font-size: 16px; color: var(--p); }

        .scroll { flex: 1; overflow-y: auto; padding: 15px; }
        .card { background: var(--card); border-radius: 18px; padding: 15px; margin-bottom: 12px; border: 1px solid #222; }

        .cal-row { display: flex; gap: 8px; overflow-x: auto; padding: 10px 0; scrollbar-width: none; }
        .day { min-width: 40px; height: 40px; border-radius: 10px; background: var(--grey); display: flex; align-items: center; justify-content: center; font-size: 12px; flex-shrink: 0; }
        .day.green { background: var(--p); color: #000; font-weight: bold; }
        .day.red { background: var(--red); }
        .day.yellow { background: #f1c40f; color: #000; }

        #video { width: 100%; height: 50vh; object-fit: cover; border-bottom: 2px solid var(--p); }
        #overlay { position: absolute; bottom: 100px; left: 15px; right: 15px; background: rgba(0,0,0,0.95); padding: 25px; border-radius: 25px; border: 1px solid var(--p); display: none; text-align: center; }

        .btn { padding: 15px; border: none; border-radius: 12px; font-weight: bold; width: 100%; margin-top: 10px; }
        .btn-p { background: var(--p); color: #000; }
        input { width: 100%; padding: 15px; background: #1a1a1a; border: 1px solid #333; color: #fff; border-radius: 12px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="scr-scan" class="screen active">
        <video id="video" autoplay playsinline muted></video>
        <div class="scroll" style="text-align:center"><h2 id="st-text">ЗАГРУЗКА...</h2></div>
        <div id="overlay">
            <h1 id="u-name">---</h1>
            <div style="display:flex; gap:10px; margin-top:15px">
                <button class="btn btn-p" onclick="app.log('IN')">ВХОД</button>
                <button class="btn" style="background:var(--red); color:#fff" onclick="app.log('OUT')">ВЫХОД</button>
            </div>
            <button class="btn" style="background:#222; color:#fff" onclick="app.closeOverlay()">ОТМЕНА</button>
        </div>
    </div>

    <div id="scr-base" class="screen">
        <div class="header"><h2>ОТЧЕТНОСТЬ</h2> <button onclick="app.download()" style="background:none; border:none; color:var(--p)">СКАЧАТЬ .TXT</button></div>
        <div class="scroll">
            <div id="month-nav" style="display:flex; gap:8px; overflow-x:auto; margin-bottom:15px"></div>
            <div id="base-list"></div>
        </div>
    </div>

    <div id="scr-staff" class="screen">
        <div class="header"><h2>ШТАТ</h2></div>
        <div class="scroll">
            <div class="card">
                <input type="text" id="reg-n" placeholder="ФИО сотрудника">
                <input type="number" id="reg-rate" placeholder="Ставка в час (руб/$)">
                <input type="file" id="reg-f" accept="image/*" capture="user">
                <button class="btn btn-p" onclick="app.reg()">ДОБАВИТЬ</button>
            </div>
            <div id="staff-list"></div>
        </div>
    </div>

    <div class="nav">
        <div class="nav-item active" onclick="app.ui('scr-scan', this)"><b>📷</b>СКАНЕР</div>
        <div class="nav-item" onclick="app.ui('scr-base', this)"><b>📅</b>БАЗА</div>
        <div class="nav-item" onclick="app.ui('scr-staff', this)"><b>👥</b>ШТАТ</div>
    </div>

<script>
let db;
let curM = new Date().getMonth();
let curU = null;
const mons = ["Янв","Фев","Мар","Апр","Май","Июн","Июл","Авг","Сен","Окт","Ноя","Дек"];

const app = {
    async init() {
        const req = indexedDB.open("BioCorp_v8", 1);
        req.onupgradeneeded = e => {
            const d = e.target.result;
            d.createObjectStore("workers", {keyPath: "name"});
            d.createObjectStore("logs", {keyPath: "id", autoIncrement: true});
        };
        req.onsuccess = e => { db = e.target.result; this.load(); };
    },

    async load() {
        const p = './models';
        await faceapi.nets.tinyFaceDetector.loadFromUri(p);
        await faceapi.nets.faceLandmark68Net.loadFromUri(p);
        await faceapi.nets.faceRecognitionNet.loadFromUri(p);
        document.getElementById('st-text').innerText = "ГОТОВ";
        this.start();
    },

    ui(id, el) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(el) el.classList.add('active');
        if(id === 'scr-base') this.renderB();
        if(id === 'scr-staff') this.renderS();
    },

    async start() {
        const v = document.getElementById('video');
        const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
        v.srcObject = s;
        setInterval(async () => {
            if(curU || !document.getElementById('scr-scan').classList.contains('active')) return;
            const ws = await this.get("workers");
            const det = await faceapi.detectSingleFace(v, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptor();
            if(det && ws.length) {
                for(let w of ws) {
                    if(faceapi.euclideanDistance(det.descriptor, new Float32Array(w.desc)) < 0.5) {
                        curU = w;
                        document.getElementById('u-name').innerText = w.name;
                        document.getElementById('overlay').style.display = 'block';
                        break;
                    }
                }
            }
        }, 1000);
    },

    async log(t) {
        const d = new Date().toISOString().split('T')[0];
        const tx = db.transaction("logs", "readwrite");
        tx.objectStore("logs").add({ 
            name: curU.name, date: d, type: t, 
            time: new Date().toLocaleTimeString(), 
            ts: Date.now() 
        });
        this.closeOverlay();
        alert(t === 'IN' ? "Смена открыта" : "Смена закрыта");
    },

    closeOverlay() { curU = null; document.getElementById('overlay').style.display = 'none'; },

    async reg() {
        const n = document.getElementById('reg-n').value, 
              r = document.getElementById('reg-rate').value,
              f = document.getElementById('reg-f').files[0];
        if(!n || !f || !r) return alert("Заполните все поля!");
        const img = await faceapi.bufferToImage(f);
        const det = await faceapi.detectSingleFace(img, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptor();
        if(det) {
            const rd = new FileReader(); rd.readAsDataURL(f);
            rd.onload = () => {
                db.transaction("workers", "readwrite").objectStore("workers").put({
                    name: n, rate: parseFloat(r), desc: Array.from(det.descriptor), pic: rd.result
                });
                alert("Сотрудник добавлен!"); this.renderS();
            };
        }
    },

    async renderS() {
        const ws = await this.get("workers");
        document.getElementById('staff-list').innerHTML = ws.map(w => `
            <div class="card" style="display:flex; justify-content:space-between; align-items:center">
                <div><b>${w.name}</b><br><small style="color:var(--p)">Ставка: ${w.rate}/ч</small></div>
                <button class="btn" style="width:auto; background:var(--red); padding:5px 10px" onclick="app.delS('${w.name}')">УДАЛИТЬ</button>
            </div>
        `).join('');
    },

    async delS(n) { if(confirm("Уволить?")) { db.transaction("workers","readwrite").objectStore("workers").delete(n); this.renderS(); } },

    async renderB() {
        document.getElementById('month-nav').innerHTML = mons.map((m, i) => `
            <div onclick="app.curM=${i};app.renderB()" style="padding:8px 15px; background:${i===curM? 'var(--p)':'#111'}; color:${i===curM?'#000':'#666'}; border-radius:10px; font-size:12px">${m}</div>
        `).join('');

        const ws = await this.get("workers");
        const ls = await this.get("logs");
        const list = document.getElementById('base-list');
        const dim = new Date(2026, curM + 1, 0).getDate();

        list.innerHTML = ws.map(w => {
            let dH = '', totalHours = 0;
            for(let i=1; i<=dim; i++) {
                const ds = `2026-${String(curM+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
                const dl = ls.filter(l => l.name === w.name && l.date === ds);
                
                // Расчет часов
                const cin = dl.find(l => l.type === 'IN'), cout = dl.find(l => l.type === 'OUT');
                let dayH = 0; if(cin && cout) dayH = (cout.ts - cin.ts) / 3600000;
                totalHours += dayH;

                let st = dl.length ? (cout ? 'green' : 'yellow') : '';
                if(dl.some(l => l.type==='ABSENT')) st = 'red';
                dH += `<div class="day ${st}" onclick="app.edit('${w.name}','${ds}')">${i}</div>`;
            }
            const salary = (totalHours * (w.rate || 0)).toFixed(2);
            return `
                <div class="card">
                    <div style="display:flex; justify-content:space-between"><b>${w.name}</b> <span style="color:var(--p)">${salary} $</span></div>
                    <div class="cal-row">${dH}</div>
                    <small style="color:#555">Всего: ${totalHours.toFixed(1)} ч.</small>
                </div>`;
        }).join('');
    },

    async edit(n, d) {
        const s = prompt("1: Был (8ч), 2: Прогул, 3: Очистить");
        const all = await this.get("logs");
        all.filter(l => l.name === n && l.date === d).forEach(l => db.transaction("logs","readwrite").objectStore("logs").delete(l.id));
        
        setTimeout(() => {
            const tx = db.transaction("logs", "readwrite");
            if(s === '1') {
                tx.objectStore("logs").add({name: n, date: d, type: 'IN', ts: Date.now()});
                tx.objectStore("logs").add({name: n, date: d, type: 'OUT', ts: Date.now() + 28800000}); // +8 часов
            }
            if(s === '2') tx.objectStore("logs").add({name: n, date: d, type: 'ABSENT'});
            setTimeout(() => this.renderB(), 100);
        }, 100);
    },

    async download() {
        const ws = await this.get("workers");
        const ls = await this.get("logs");
        let t = `ФИНАНСОВЫЙ ОТЧЕТ: ${mons[curM]} 2026\n` + "=".repeat(30) + "\n";
        
        ws.forEach(w => {
            let h = 0;
            const wl = ls.filter(l => l.name === w.name && new Date(l.date).getMonth() === curM);
            const days = [...new Set(wl.map(l => l.date))];
            days.forEach(d => {
                const dayL = wl.filter(l => l.date === d);
                const cin = dayL.find(l => l.type === 'IN'), cout = dayL.find(l => l.type === 'OUT');
                if(cin && cout) h += (cout.ts - cin.ts) / 3600000;
            });
            t += `${w.name.padEnd(15)} | Часы: ${h.toFixed(1).padStart(5)} | ЗП: ${(h * w.rate).toFixed(2)}\n`;
        });

        const b = new Blob([t], {type:"text/plain"});
        const a = document.createElement("a"); a.href = URL.createObjectURL(b); a.download = `report_${mons[curM]}.txt`; a.click();
    },

    get(n) { return new Promise(r => db.transaction(n).objectStore(n).getAll().onsuccess = e => r(e.target.result)); }
};

window.onload = () => app.init();
</script>
</body>
</html>
