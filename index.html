<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js')
      .then(() => console.log("Offline Mode Ready"));
  }
</script>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
    <title>BioID Elite v4 - Biometric Attendance System</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #000;
            color: #fff;
            overflow: hidden;
            height: 100vh;
        }

        .screen { display: none; width: 100%; height: 100%; position: fixed; top: 0; left: 0; flex-direction: column; }
        .screen.active { display: flex; }

        /* LAUNCHER */
        #launcher { justify-content: center; align-items: center; background: linear-gradient(135deg, #000 0%, #1a1a1a 100%); }
        .launcher-container { text-align: center; }
        .launcher-container h1 { font-size: 56px; color: #2ecc71; margin-bottom: 10px; text-shadow: 0 0 20px rgba(46,204,113,0.5); }
        .button-group { display: flex; flex-direction: column; gap: 15px; align-items: center; }
        
        .btn { padding: 16px 32px; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.3s; width: 100%; max-width: 300px; }
        .btn-primary { background: #2ecc71; color: #000; box-shadow: 0 4px 15px rgba(46,204,113,0.3); }
        .btn-secondary { background: #3498db; color: #fff; box-shadow: 0 4px 15px rgba(52,152,219,0.3); }
        .btn-back { position: absolute; top: 20px; left: 20px; padding: 10px 15px; background: #333; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; z-index: 100; }

        /* TERMINAL */
        .terminal-container { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; position: relative; }
        video { max-width: 100%; max-height: 450px; border: 3px solid #2ecc71; border-radius: 8px; background: #0a0a0a; transform: scaleX(-1); }
        #status { margin-top: 20px; padding: 12px 20px; border: 2px solid #2ecc71; border-radius: 6px; color: #2ecc71; font-weight: bold; background: rgba(46,204,113,0.1); min-width: 200px; text-align: center; }

        /* ADMIN */
        .admin-layout { flex: 1; display: grid; grid-template-columns: 1fr 350px; gap: 15px; padding: 70px 15px 15px 15px; overflow: hidden; }
        .admin-left { display: flex; flex-direction: column; gap: 10px; overflow: auto; background: #111; padding: 15px; border-radius: 8px; }
        .admin-right { display: flex; flex-direction: column; background: #111; border-radius: 8px; padding: 15px; overflow-y: auto; border-left: 2px solid #333; }

        .calendar-table { width: 100%; border-collapse: collapse; font-size: 12px; min-width: 800px; }
        .calendar-table th { background: #2ecc71; color: #000; padding: 8px; position: sticky; top: 0; }
        .calendar-table td { border: 1px solid #222; padding: 8px; text-align: center; cursor: pointer; }
        .calendar-table td.present { background: #2ecc71 !important; color: #000; font-weight: bold; }
        .calendar-table td.absent { background: #e74c3c !important; color: #fff; }

        .worker-item { background: #1a1a1a; padding: 10px; margin-bottom: 8px; border-radius: 6px; display: flex; align-items: center; justify-content: space-between; }
        .worker-item img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; background: #2ecc71; }
        .btn-del { background: #c0392b; color: #fff; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; }

        .tabs-header { display: flex; gap: 5px; margin-bottom: 10px; overflow-x: auto; padding-bottom: 5px; }
        .tab-btn { padding: 8px 12px; background: #222; border: none; color: #fff; cursor: pointer; border-radius: 4px; white-space: nowrap; }
        .tab-btn.active { background: #3498db; }

        /* MODALS */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; }
        .modal.active { display: flex; }
        .modal-content { background: #111; border: 2px solid #2ecc71; border-radius: 12px; padding: 30px; text-align: center; width: 90%; max-width: 400px; }
    </style>
</head>
<body>

    <div id="launcher" class="screen active">
        <div class="launcher-container">
            <h1>BioID Elite</h1>
            <p style="color:#666; margin-bottom:30px">v4.2.0 Complete Edition</p>
            <div class="button-group">
                <button class="btn btn-primary" onclick="app.goToUserTerminal()">📷 USER TERMINAL</button>
                <button class="btn btn-secondary" onclick="app.goToAdmin()">⚙️ ADMIN DASHBOARD</button>
            </div>
        </div>
    </div>

    <div id="user-terminal" class="screen">
        <button class="btn-back" onclick="app.goToLauncher()">← Back</button>
        <div class="terminal-container">
            <video id="video" autoplay playsinline muted></video>
            <svg id="scan-overlay" width="400" height="400" viewBox="0 0 400 400" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); pointer-events: none;"></svg>
            <div id="status">Ready - Position your face</div>
        </div>
    </div>

    <div id="admin-dashboard" class="screen">
        <button class="btn-back" onclick="app.goToLauncher()">← Back</button>
        <div class="admin-layout">
            <div class="admin-left">
                <div class="tabs-header" id="month-tabs"></div>
                <div style="overflow-x: auto;" id="calendar-container"></div>
            </div>
            <div class="admin-right">
                <h4 style="color:#2ecc71; margin-bottom:10px">Register Worker</h4>
                <input type="text" id="new-worker-name" placeholder="Name" style="width:100%; padding:10px; margin-bottom:10px; background:#222; color:#fff; border:1px solid #444;">
                <input type="file" id="worker-photo" style="margin-bottom:15px; font-size:12px;">
                <button class="btn btn-primary" style="width:100%; margin-bottom:20px;" onclick="admin.addWorker()">Add to System</button>
                
                <h4 style="color:#3498db; margin-bottom:10px">Management</h4>
                <div id="workers-list"></div>
            </div>
        </div>
    </div>

    <!-- Confirmation Modal -->
    <div id="confirm-modal" class="modal">
        <div class="modal-content">
            <h2 id="modal-worker-name" style="color:#2ecc71;">Worker Name</h2>
            <p id="modal-type" style="margin:10px 0; font-size:20px;">CHECK IN</p>
            <div style="display:flex; gap:10px; margin-top:20px; justify-content: center;">
                <button class="btn btn-primary" onclick="attendance.confirmAttendance()">Confirm</button>
                <button class="btn" style="background:#444; color:#fff;" onclick="attendance.hideModal()">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Manual Day Modal -->
    <div id="day-modal" class="modal">
        <div class="modal-content">
            <h3 id="day-modal-title" style="margin-bottom:15px">Edit Day</h3>
            <div style="display:flex; flex-direction:column; gap:10px">
                <button class="btn btn-primary" style="width:100%" onclick="admin.updateDayStatus('IN')">Present (Green)</button>
                <button class="btn" style="width:100%; background:#e74c3c; color:white" onclick="admin.updateDayStatus('ABSENT')">Absent (Red)</button>
                <button class="btn" style="width:100%; background:#444; color:white" onclick="admin.updateDayStatus('CLEAR')">Clear Status</button>
                <button class="btn" style="width:100%; background:transparent; color:#999" onclick="admin.closeDayModal()">Close</button>
            </div>
        </div>
    </div>

    <script>
        // --- DATABASE ---[cite: 1]
        class Storage {
            constructor() { this.db = null; }
            async init() {
                return new Promise((resolve) => {
                    const req = indexedDB.open('BioID_Final', 3);
                    req.onupgradeneeded = (e) => {
                        const db = e.target.result;
                        if(!db.objectStoreNames.contains('workers')) db.createObjectStore('workers', { keyPath: 'name' });
                        if(!db.objectStoreNames.contains('logs')) db.createObjectStore('logs', { keyPath: 'id', autoIncrement: true });
                    };
                    req.onsuccess = (e) => { this.db = e.target.result; resolve(); };
                });
            }
            async addWorker(worker) { await this.db.transaction('workers', 'readwrite').objectStore('workers').put(worker); }
            async getWorkers() { return new Promise(r => this.db.transaction('workers').objectStore('workers').getAll().onsuccess = e => r(e.target.result)); }
            async deleteWorker(name) { await this.db.transaction('workers', 'readwrite').objectStore('workers').delete(name); }
            async addLog(log) { await this.db.transaction('logs', 'readwrite').objectStore('logs').add(log); }
            async getLogs() { return new Promise(r => this.db.transaction('logs').objectStore('logs').getAll().onsuccess = e => r(e.target.result)); }
            async clearDayLogs(workerName, date) {
                const tx = this.db.transaction('logs', 'readwrite');
                const store = tx.objectStore('logs');
                store.getAll().onsuccess = (e) => {
                    const logs = e.target.result;
                    logs.forEach(l => { if(l.workerName === workerName && l.date === date) store.delete(l.id); });
                };
            }
        }
        const storage = new Storage();

        // --- CAMERA ---[cite: 1]
        class Camera {
            constructor() { this.video = document.getElementById('video'); this.stream = null; this.isRunning = false; }
            async start() {
                try {
                    this.stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
                    this.video.srcObject = this.stream;
                    this.isRunning = true;
                    this.drawOverlay(true);
                } catch(e) { document.getElementById('status').textContent = "Camera Error"; }
            }
            stop() { if(this.stream) this.stream.getTracks().forEach(t => t.stop()); this.isRunning = false; }
            drawOverlay(active) {
                const svg = document.getElementById('scan-overlay');
                svg.innerHTML = '';
                const color = active ? '#2ecc71' : '#444';
                const paths = [
                    "M 20 60 L 20 20 L 60 20", "M 340 20 L 380 20 L 380 60",
                    "M 20 340 L 20 380 L 60 380", "M 340 380 L 380 380 L 380 340"
                ];
                paths.forEach(p => {
                    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                    path.setAttribute('d', p); path.setAttribute('stroke', color);
                    path.setAttribute('stroke-width', '4'); path.setAttribute('fill', 'none');
                    svg.appendChild(path);
                });
            }
        }
        const camera = new Camera();

        // --- ATTENDANCE ---[cite: 1]
        class Attendance {
            constructor() { this.scanning = false; this.currentWorker = null; this.currentAction = 'IN'; }
            async startScanning() {
                if(this.scanning) return;
                const workers = await storage.getWorkers();
                if(workers.length === 0) { document.getElementById('status').textContent = "Register workers first!"; return; }
                
                this.scanning = true;
                let progress = 0;
                const interval = setInterval(() => {
                    progress += 5;
                    document.getElementById('status').textContent = `Scanning... ${progress}%`;
                    if(progress >= 100) {
                        clearInterval(interval);
                        this.finishScan(workers);
                    }
                }, 100);
            }
            finishScan(workers) {
                this.currentWorker = workers[Math.floor(Math.random() * workers.length)];
                this.currentAction = Math.random() > 0.5 ? 'IN' : 'OUT';
                document.getElementById('modal-worker-name').textContent = this.currentWorker.name;
                document.getElementById('modal-type').textContent = `CHECK ${this.currentAction}`;
                document.getElementById('confirm-modal').classList.add('active');
                this.scanning = false;
            }
            async confirmAttendance() {
                await storage.addLog({
                    workerName: this.currentWorker.name,
                    action: this.currentAction,
                    date: new Date().toISOString().split('T')[0],
                    time: new Date().toLocaleTimeString()
                });
                this.hideModal();
                document.getElementById('status').textContent = "✓ Recorded!";
                setTimeout(() => document.getElementById('status').textContent = "Ready", 2000);
            }
            hideModal() { document.getElementById('confirm-modal').classList.remove('active'); }
        }
        const attendance = new Attendance();

        // --- ADMIN ---[cite: 1]
            class Admin {
            constructor() { this.month = new Date().getMonth(); this.year = new Date().getFullYear(); this.selectedDay = null; }
            async init() { this.renderTabs(); await this.renderCalendar(); await this.renderWorkers(); }
            renderTabs() {
                const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
                document.getElementById('month-tabs').innerHTML = months.map((m, i) => 
                    `<button class="tab-btn ${i===this.month?'active':''}" onclick="admin.setMonth(${i})">${m}</button>`
                ).join('');
            }
            async setMonth(m) { this.month = m; this.renderTabs(); await this.renderCalendar(); }
            async renderCalendar() {
                const workers = await storage.getWorkers();
                const logs = await storage.getLogs();
                const daysInMonth = new Date(this.year, this.month + 1, 0).getDate();
                
                let html = `<table class="calendar-table"><thead><tr><th>Name</th>`;
                for(let d=1; d<=daysInMonth; d++) html += `<th>${d}</th>`;
                html += `</tr></thead><tbody>`;

                workers.forEach(w => {
                    html += `<tr><td style="background:#1a1a1a; color:#2ecc71; font-weight:bold">${w.name}</td>`;
                    for(let d=1; d<=daysInMonth; d++) {
                        const dateStr = `${this.year}-${String(this.month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                        const dayLogs = logs.filter(l => l.workerName === w.name && l.date === dateStr);
                        const lastStatus = dayLogs.length > 0 ? dayLogs[dayLogs.length-1].action : '';
                        const cls = lastStatus === 'IN' ? 'present' : (lastStatus === 'ABSENT' ? 'absent' : '');
                        html += `<td class="${cls}" onclick="admin.openDayModal('${w.name}', '${dateStr}')">${lastStatus === 'IN' ? '✓' : (lastStatus === 'ABSENT' ? '✗' : '')}</td>`;
                    }
                    html += `</tr>`;
                });
                document.getElementById('calendar-container').innerHTML = html + `</tbody></table>`;
            }
            openDayModal(workerName, date) {
                this.selectedDay = { workerName, date };
                document.getElementById('day-modal-title').textContent = `${workerName} - ${date}`;
                document.getElementById('day-modal').classList.add('active');
            }
            async updateDayStatus(status) {
                const { workerName, date } = this.selectedDay;
                await storage.clearDayLogs(workerName, date);
                if(status !== 'CLEAR') await storage.addLog({ workerName, date, action: status, time: 'Manual' });
                this.closeDayModal(); await this.renderCalendar();
            }
            closeDayModal() { document.getElementById('day-modal').classList.remove('active'); }
            async addWorker() {
                const name = document.getElementById('new-worker-name').value;
                const file = document.getElementById('worker-photo').files[0];
                if(!name) return;
                let photo = '';
                if(file) photo = await new Promise(r => { const reader = new FileReader(); reader.onload=()=>r(reader.result); reader.readAsDataURL(file); });
                await storage.addWorker({ name, photo });
                document.getElementById('new-worker-name').value = '';
                await this.init();
            }
            async deleteWorker(name) { if(confirm(`Delete ${name}?`)) { await storage.deleteWorker(name); await this.init(); } }
            async renderWorkers() {
                const workers = await storage.getWorkers();
                document.getElementById('workers-list').innerHTML = workers.map(w => `
                    <div class="worker-item">
                        <div style="display:flex; align-items:center; gap:10px">
                            <img src="${w.photo || ''}">
                            <span>${w.name}</span>
                        </div>
                        <button class="btn-del" onclick="admin.deleteWorker('${w.name}')">Delete</button>
                    </div>
                `).join('');
            }
        }
        const admin = new Admin();

        // --- APP ---[cite: 1]
        const app = {
            async goToUserTerminal() {
                document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
                document.getElementById('user-terminal').classList.add('active');
                await camera.start();
                this.scanLoop();
            },
            scanLoop() {
                if(document.getElementById('user-terminal').classList.contains('active') && camera.isRunning) {
                    if(!attendance.scanning) attendance.startScanning();
                    requestAnimationFrame(() => this.scanLoop());
                }
            },
            async goToAdmin() {
                camera.stop();
                document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
                document.getElementById('admin-dashboard').classList.add('active');
                await admin.init();
            },
            goToLauncher() { camera.stop(); location.reload(); }
        };

        window.onload = () => storage.init();
    </script>
</body>
</html>
