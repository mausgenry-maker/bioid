<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>BioID Mobile Elite</title>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        :root { --primary: #2ecc71; --bg: #000; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: #fff; height: 100vh; overflow: hidden; }
        
        .screen { display: none; width: 100%; height: 100%; position: fixed; flex-direction: column; padding: 20px; }
        .screen.active { display: flex; }

        /* Launcher */
        #launcher { justify-content: center; align-items: center; text-align: center; }
        .btn { width: 100%; max-width: 280px; padding: 18px; border: none; border-radius: 15px; font-size: 16px; font-weight: bold; margin: 10px 0; cursor: pointer; transition: 0.2s; }
        .btn-green { background: var(--primary); color: #000; }
        .btn-blue { background: #3498db; color: #fff; }
        .btn:disabled { opacity: 0.2; transform: scale(0.95); }

        /* Terminal - Камера во весь экран */
        #user-terminal { padding: 0; background: #000; }
        .video-container { position: relative; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        .overlay-ui { position: absolute; bottom: 40px; width: 100%; text-align: center; z-index: 5; }
        #status-label { background: rgba(0,0,0,0.7); padding: 10px 20px; border-radius: 20px; color: var(--primary); font-weight: bold; border: 1px solid var(--primary); }

        /* Admin - Адаптивная сетка */
        .admin-content { overflow-y: auto; flex: 1; margin-top: 50px; }
        .card { background: #111; padding: 15px; border-radius: 15px; margin-bottom: 15px; border: 1px solid #222; }
        input, select { width: 100%; padding: 12px; background: #000; border: 1px solid #333; color: #fff; border-radius: 8px; margin: 10px 0; }
        
        .cal-wrapper { overflow-x: auto; background: #0a0a0a; border-radius: 10px; }
        table { border-collapse: collapse; min-width: 600px; width: 100%; font-size: 11px; }
        th, td { padding: 8px; border: 1px solid #222; text-align: center; }
        th { background: var(--primary); color: #000; }
        .present { background: var(--primary); color: #000; }

        .btn-close { position: absolute; top: 20px; left: 20px; z-index: 10; background: rgba(255,255,255,0.1); padding: 10px; border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="launcher" class="screen active">
        <h1 style="font-size: 48px; letter-spacing: -2px;">BioID<span style="color:var(--primary)">•</span></h1>
        <p id="msg" style="color: #666; font-size: 14px; margin-bottom: 30px;">ЗАГРУЗКА ИИ...</p>
        <button class="btn btn-green" id="b-term" onclick="ui('user-terminal')" disabled>СКАНЕР ЛИЦА</button>
        <button class="btn btn-blue" id="b-adm" onclick="ui('admin-dashboard')" disabled>БАЗА ДАННЫХ</button>
    </div>

    <div id="user-terminal" class="screen">
        <div class="btn-close" onclick="location.reload()">✕</div>
        <div class="video-container">
            <video id="video" autoplay playsinline muted></video>
            <div class="overlay-ui">
                <span id="status-label">ПОИСК ЛИЦА...</span>
            </div>
        </div>
    </div>

    <div id="admin-dashboard" class="screen">
        <div class="btn-close" onclick="location.reload()">✕</div>
        <div class="admin-content">
            <div class="card">
                <h3>Регистрация</h3>
                <input type="text" id="reg-name" placeholder="Имя сотрудника">
                <input type="file" id="reg-file" accept="image/*" capture="user">
                <button class="btn btn-green" style="width:100%" onclick="register()">ДОБАВИТЬ</button>
            </div>
            
            <div class="card">
                <h3>Журнал посещений</h3>
                <div class="cal-wrapper" id="cal-view"></div>
            </div>
        </div>
    </div>

<script>
let db;
const MODELS_PATH = './models';

// Инициализация базы
const initDB = () => {
    const req = indexedDB.open("BioMobileDB", 2);
    req.onupgradeneeded = e => {
        const d = e.target.result;
        if(!d.objectStoreNames.contains("workers")) d.createObjectStore("workers", {keyPath:"name"});
        if(!d.objectStoreNames.contains("logs")) d.createObjectStore("logs", {keyPath:"id", autoIncrement:true});
    };
    req.onsuccess = e => db = e.target.result;
};

// Загрузка ИИ
async function loadModels() {
    try {
        await faceapi.nets.tinyFaceDetector.loadFromUri(MODELS_PATH);
        await faceapi.nets.faceLandmark68Net.loadFromUri(MODELS_PATH);
        await faceapi.nets.faceRecognitionNet.loadFromUri(MODELS_PATH);
        document.getElementById('msg').innerText = "СИСТЕМА ГОТОВА";
        document.getElementById('b-term').disabled = document.getElementById('b-adm').disabled = false;
    } catch(e) {
        document.getElementById('msg').innerText = "ОШИБКА МОДЕЛЕЙ";
        console.error(e);
    }
}

// Переключение экранов
function ui(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    if(id === 'user-terminal') startCamera();
    if(id === 'admin-dashboard') renderAdmin();
}

// Работа с камерой (Исправлено для мобильных)
async function startCamera() {
    const video = document.getElementById('video');
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ 
            video: { 
                facingMode: "user",
                width: { ideal: 1280 },
                height: { ideal: 720 }
            } 
        });
        video.srcObject = stream;
        video.onloadedmetadata = () => {
            video.play();
            runDetection();
        };
    } catch(e) {
        alert("Ошибка камеры: " + e.message);
    }
}

async function runDetection() {
    const video = document.getElementById('video');
    const workers = await new Promise(res => db.transaction("workers").objectStore("workers").getAll().onsuccess = e => res(e.target.result));
    
    if(!workers.length) {
        document.getElementById('status-label').innerText = "БАЗА ПУСТА";
        return;
    }

    const detectorOptions = new faceapi.TinyFaceDetectorOptions({ inputSize: 160, scoreThreshold: 0.5 });

    setInterval(async () => {
        if(video.paused || video.ended) return;
        const det = await faceapi.detectSingleFace(video, detectorOptions).withFaceLandmarks().withFaceDescriptor();
        
        if(det) {
            for(let w of workers) {
                const dist = faceapi.euclideanDistance(det.descriptor, new Float32Array(w.desc));
                if(dist < 0.5) {
                    document.getElementById('status-label').innerText = "ДОСТУП: " + w.name;
                    document.getElementById('status-label').style.color = "#2ecc71";
                    saveLog(w.name);
                    return;
                }
            }
            document.getElementById('status-label').innerText = "НЕИЗВЕСТНЫЙ";
            document.getElementById('status-label').style.color = "#e74c3c";
        }
    }, 600);
}

function saveLog(name) {
    const today = new Date().toISOString().split('T')[0];
    const tx = db.transaction("logs", "readwrite");
    tx.objectStore("logs").put({name, date: today, time: new Date().toLocaleTimeString()});
}

async function register() {
    const n = document.getElementById('reg-name').value, f = document.getElementById('reg-file').files[0];
    if(!n || !f) return alert("Введите имя и выберите фото");
    
    const img = await faceapi.bufferToImage(f);
    const det = await faceapi.detectSingleFace(img, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptor();
    
    if(det) {
        const reader = new FileReader();
        reader.readAsDataURL(f);
        reader.onload = () => {
            db.transaction("workers", "readwrite").objectStore("workers").put({
                name: n, 
                desc: Array.from(det.descriptor), 
                pic: reader.result
            });
            alert("СОХРАНЕНО: " + n);
            renderAdmin();
        };
    } else {
        alert("Лицо не распознано на фото");
    }
}

async function renderAdmin() {
    const ws = await new Promise(res => db.transaction("workers").objectStore("workers").getAll().onsuccess = e => res(e.target.result));
    const ls = await new Promise(res => db.transaction("logs").objectStore("logs").getAll().onsuccess = e => res(e.target.result));
    const today = new Date();
    
    let h = '<table><tr><th>Имя</th>';
    for(let i=1; i<=31; i++) h += `<th>${i}</th>`;
    h += '</tr>';
    
    ws.forEach(w => {
        h += `<tr><td><b>${w.name}</b></td>`;
        for(let i=1; i<=31; i++) {
            const dateStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
            const ok = ls.some(l => l.name === w.name && l.date === dateStr);
            h += `<td class="${ok?'present':''}"></td>`;
        }
        h += '</tr>';
    });
    document.getElementById('cal-view').innerHTML = h + '</table>';
}

window.onload = () => { initDB(); loadModels(); };
</script>
</body>
</html>
