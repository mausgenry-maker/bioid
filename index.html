<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BioID Corp v8.7</title>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        :root { --p: #00ff88; --bg: #000; --card: #111; --red: #ff4d4d; --yellow: #f1c40f; --grey: #2a2a2a; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; font-family: -apple-system, system-ui, sans-serif; height: 100vh; overflow: hidden; }

        .screen { display: none; width: 100%; height: 100%; position: fixed; flex-direction: column; padding-bottom: 90px; }
        .screen.active { display: flex; }
        
        .nav { position: fixed; bottom: 0; width: 100%; height: 80px; background: #0a0a0a; display: flex; border-top: 1px solid #222; z-index: 1000; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 11px; color: #555; }
        .nav-item.active { color: var(--p); }
        .nav-item b { font-size: 24px; margin-bottom: 4px; }

        .video-box { width: 100%; height: 60vh; background: #111; position: relative; border-bottom: 2px solid var(--p); display: flex; align-items: center; justify-content: center; overflow: hidden; }
        #video { width: 100%; height: 100%; object-fit: cover; }
        
        #cam-btn { 
            position: absolute; z-index: 99; padding: 20px 40px; 
            background: var(--p); color: #000; border: none; 
            border-radius: 50px; font-weight: 900; font-size: 16px;
            box-shadow: 0 0 30px rgba(0,255,136,0.5); 
        }

        .scroll { flex: 1; overflow-y: auto; padding: 15px; -webkit-overflow-scrolling: touch; }
        .card { background: var(--card); border-radius: 20px; padding: 18px; margin-bottom: 12px; border: 1px solid #222; }

        .m-ctrl { display: flex; align-items: center; justify-content: space-between; background: #1a1a1a; border-radius: 12px; margin-bottom: 15px; padding: 5px; }
        .m-btn { padding: 10px 15px; background: #222; border: none; color: #fff; border-radius: 8px; }

        .cal-row { display: flex; gap: 8px; overflow-x: auto; padding: 10px 0; }
        .day { min-width: 40px; height: 40px; border-radius: 10px; background: var(--grey); display: flex; align-items: center; justify-content: center; font-size: 13px; flex-shrink: 0; }
        .day.green { background: var(--p); color: #000; }
        .day.red { background: var(--red); color: #fff; }
        .day.yellow { background: var(--yellow); color: #000; }

        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; display: none; align-items: center; justify-content: center; flex-direction: column; padding: 20px; }

        .btn { padding: 18px; border: none; border-radius: 15px; font-weight: bold; width: 100%; font-size: 16px; }
        .btn-p { background: var(--p); color: #000; }
        input { width: 100%; padding: 16px; background: #1a1a1a; border: 1px solid #333; color: #fff; border-radius: 14px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="scr-scan" class="screen active">
        <div class="video-box">
            <button id="cam-btn" onclick="app.startCamera()">НАЖМИТЕ ДЛЯ ЗАПУСКА КАМЕРЫ</button>
            <video id="video" autoplay playsinline muted></video>
        </div>
        <div class="scroll">
            <h3 id="st-text" style="text-align:center; color:var(--p); opacity: 0.7">СИСТЕМА ОЖИДАЕТ...</h3>
        </div>
        
        <div id="overlay">
            <h1 id="u-name" style="font-size: 32px; margin-bottom: 30px;">---</h1>
            <button class="btn btn-p" onclick="app.log('IN')">ВХОД (START)</button>
            <button class="btn" style="background:var(--red); color:#fff; margin-top:15px" onclick="app.log('OUT')">ВЫХОД (END)</button>
            <button class="btn" style="background:none; color:#666; margin-top:20px" onclick="app.closeOverlay()">ОТМЕНА</button>
        </div>
    </div>

    <!-- Разделы БАЗА и ШТАТ остаются такими же по структуре, но с исправленным JS -->
    <div id="scr-base" class="screen">
        <div class="header" style="padding:20px; border-bottom:1px solid #222; display:flex; justify-content:space-between">
            <h2>ОТЧЕТЫ</h2>
            <button onclick="app.download()" style="background:none; border:none; color:var(--p)">СКАЧАТЬ .TXT</button>
        </div>
        <div class="scroll">
            <div class="m-ctrl">
                <button class="m-btn" onclick="app.changeMonth(-1)">←</button>
                <span id="cur-m-name">---</span>
                <button class="m-btn" onclick="app.changeMonth(1)">→</button>
            </div>
            <div id="base-list"></div>
        </div>
    </div>

    <div id="scr-staff" class="screen">
        <div class="header" style="padding:20px; border-bottom:1px solid #222"><h2>ШТАТ</h2></div>
        <div class="scroll">
            <div class="card">
                <input type="text" id="reg-n" placeholder="Имя сотрудника">
                <input type="number" id="reg-rate" placeholder="Ставка в час">
                <input type="file" id="reg-f" accept="image/*" capture="user">
                <button class="btn btn-p" onclick="app.reg()">СОЗДАТЬ ПРОФИЛЬ</button>
            </div>
            <div id="staff-list"></div>
        </div>
    </div>

    <div class="nav">
        <div class="nav-item active" onclick="app.ui('scr-scan', this)"><b>📷</b>СКАНЕР</div>
        <div class="nav-item" onclick="app.ui('scr-base', this)"><b>📅</b>БАЗА</div>
        <div class="nav-item" onclick="app.ui('scr-staff', this)"><b>👥</b>ШТАТ</div>
    </div>

<script>
let db;
let viewDate = new Date();
let curU = null;
let modelsReady = false;

const app = {
    async init() {
        const req = indexedDB.open("BioID_Final_v87", 1);
        req.onupgradeneeded = e => {
            const d = e.target.result;
            d.createObjectStore("workers", {keyPath: "name"});
            d.createObjectStore("logs", {keyPath: "id", autoIncrement: true});
        };
        req.onsuccess = e => { 
            db = e.target.result; 
            this.loadModels(); 
        };
    },

    async loadModels() {
        const p = './models';
        try {
            await Promise.all([
                faceapi.nets.tinyFaceDetector.loadFromUri(p),
                faceapi.nets.faceLandmark68Net.loadFromUri(p),
                faceapi.nets.faceRecognitionNet.loadFromUri(p)
            ]);
            modelsReady = true;
            document.getElementById('st-text').innerText = "МОДЕЛИ ЗАГРУЖЕНЫ";
        } catch(e) {
            document.getElementById('st-text').innerText = "ОШИБКА ЗАГРУЗКИ МОДЕЛЕЙ";
        }
    },

    async startCamera() {
        const v = document.getElementById('video');
        const btn = document.getElementById('cam-btn');
        
        // Сначала пытаемся запустить камеру без лишних проверок
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { 
                    facingMode: "user",
                    width: { ideal: 1280 },
                    height: { ideal: 720 }
                } 
            });
            v.srcObject = stream;
            btn.style.display = 'none';
            document.getElementById('st-text').innerText = "ПОИСК ЛИЦА...";
            this.runScanner();
        } catch(err) {
            console.error(err);
            alert("Камера заблокирована. Проверьте HTTPS или настройки разрешений.");
        }
    },

    runScanner() {
        setInterval(async () => {
            if(curU || !modelsReady || !document.getElementById('scr-scan').classList.contains('active')) return;
            
            const v = document.getElementById('video');
            const ws = await this.get("workers");
            if(!ws.length) return;

            const det = await faceapi.detectSingleFace(v, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptor();
            
            if(det) {
                for(let w of ws) {
                    const dist = faceapi.euclideanDistance(det.descriptor, new Float32Array(w.desc));
                    if(dist < 0.45) {
                        curU = w;
                        document.getElementById('u-name').innerText = w.name;
                        document.getElementById('overlay').style.display = 'flex';
                        break;
                    }
                }
            }
        }, 800); // Чуть быстрее интервал для отзывчивости
    },

    ui(id, el) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(el) el.classList.add('active');
        if(id === 'scr-base') this.renderB();
        if(id === 'scr-staff') this.renderS();
    },

    async log(t) {
        const d = new Date().toISOString().split('T')[0];
        const tx = db.transaction("logs", "readwrite");
        tx.objectStore("logs").add({ 
            name: curU.name, date: d, type: t, ts: Date.now() 
        });
        this.closeOverlay();
    },

    closeOverlay() { 
        curU = null; 
        document.getElementById('overlay').style.display = 'none'; 
    },

    async reg() {
        const n = document.getElementById('reg-n').value, 
              r = document.getElementById('reg-rate').value, 
              f = document.getElementById('reg-f').files[0];
        if(!n || !f || !r) return alert("Заполните всё!");
        
        const img = await faceapi.bufferToImage(f);
        const det = await faceapi.detectSingleFace(img, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptor();
        
        if(det) {
            const rd = new FileReader(); rd.readAsDataURL(f);
            rd.onload = () => {
                const tx = db.transaction("workers", "readwrite");
                tx.objectStore("workers").put({
                    name: n, rate: parseFloat(r), desc: Array.from(det.descriptor), pic: rd.result
                });
                alert("Успех!"); this.renderS();
            };
        } else {
            alert("Лицо на фото не найдено!");
        }
    },

    async renderS() {
        const ws = await this.get("workers");
        document.getElementById('staff-list').innerHTML = ws.map(w => `
            <div class="card" style="display:flex; justify-content:space-between; align-items:center">
                <div><b>${w.name}</b><br><small>${w.rate} за час</small></div>
                <button onclick="app.delS('${w.name}')" style="background:none; border:none; color:var(--red)">УДАЛИТЬ</button>
            </div>
        `).join('');
    },

    async delS(n) { if(confirm("Удалить?")) { db.transaction("workers","readwrite").objectStore("workers").delete(n); this.renderS(); } },

    changeMonth(dir) { viewDate.setMonth(viewDate.getMonth() + dir); this.renderB(); },

    async renderB() {
        const mNames = ["ЯНВАРЬ","ФЕВРАЛЬ","МАРТ","АПРЕЛЬ","МАЙ","ИЮНЬ","ИЮЛЬ","АВГУСТ","СЕНТЯБРЬ","ОКТЯБРЬ","НОЯБРЬ","ДЕКАБРЬ"];
        document.getElementById('cur-m-name').innerText = `${mNames[viewDate.getMonth()]} ${viewDate.getFullYear()}`;
        const ws = await this.get("workers");
        const ls = await this.get("logs");
        const dim = new Date(viewDate.getFullYear(), viewDate.getMonth() + 1, 0).getDate();

        document.getElementById('base-list').innerHTML = ws.map(w => {
            let dH = '', totalH = 0;
            for(let i=1; i<=dim; i++) {
                const ds = `${viewDate.getFullYear()}-${String(viewDate.getMonth()+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
                const dl = ls.filter(l => l.name === w.name && l.date === ds);
                const cin = dl.find(l => l.type === 'IN'), cout = dl.find(l => l.type === 'OUT');
                if(cin && cout) totalH += (cout.ts - cin.ts) / 3600000;
                let st = dl.length ? (cout ? 'green' : 'yellow') : (dl.some(l => l.type==='ABSENT') ? 'red' : '');
                dH += `<div class="day ${st}" onclick="app.edit('${w.name}','${ds}')">${i}</div>`;
            }
            return `<div class="card"><b>${w.name}</b> <span style="float:right; color:var(--p)">${(totalH * w.rate).toFixed(0)}</span><div class="cal-row">${dH}</div></div>`;
        }).join('');
    },

    async edit(n, d) {
        const s = prompt("1: Был (8ч), 2: Прогул, 3: Очистить");
        if(!s) return;
        const tx = db.transaction("logs", "readwrite");
        const store = tx.objectStore("logs");
        const all = await this.get("logs");
        all.filter(l => l.name === n && l.date === d).forEach(l => store.delete(l.id));
        
        tx.oncomplete = () => {
            if(s==='1') {
                const tx2 = db.transaction("logs", "readwrite");
                tx2.objectStore("logs").add({name: n, date: d, type: 'IN', ts: Date.now()});
                tx2.objectStore("logs").add({name: n, date: d, type: 'OUT', ts: Date.now() + 28800000});
                tx2.oncomplete = () => this.renderB();
            } else if(s==='2') {
                const tx3 = db.transaction("logs", "readwrite");
                tx3.objectStore("logs").add({name: n, date: d, type: 'ABSENT'});
                tx3.oncomplete = () => this.renderB();
            } else this.renderB();
        };
    },

    async download() {
        const ws = await this.get("workers");
        const ls = await this.get("logs");
        let t = `ОТЧЕТ ЗА ${viewDate.getMonth()+1}/${viewDate.getFullYear()}\n\n`;
        ws.forEach(w => {
            let h = 0;
            ls.filter(l => l.name === w.name && new Date(l.date).getMonth() === viewDate.getMonth()).forEach((l, i, arr) => {
                if(l.type === 'IN') {
                    const out = arr.find(o => o.date === l.date && o.type === 'OUT');
                    if(out) h += (out.ts - l.ts) / 3600000;
                }
            });
            t += `${w.name}: ${h.toFixed(1)}ч | Итого: ${(h * w.rate).toFixed(0)}\n`;
        });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(new Blob([t], {type:"text/plain"}));
        a.download = "report.txt"; a.click();
    },

    get(n) { return new Promise(r => db.transaction(n).objectStore(n).getAll().onsuccess = e => r(e.target.result)); }
};
window.onload = () => app.init();
</script>
</body>
</html>
