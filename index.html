<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>BioID Elite v4.2 - AI Engine</title>
    <!-- Подключаем библиотеку face-api.js напрямую из CDN -->
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #0a0a0a; color: #fff; overflow: hidden; height: 100vh; }
        .screen { display: none; width: 100%; height: 100%; position: fixed; top: 0; left: 0; flex-direction: column; }
        .screen.active { display: flex; }
        
        /* Кнопка назад */
        .btn-back { position: absolute; top: 20px; left: 20px; padding: 12px 20px; background: #222; color: #fff; border: 1px solid #333; border-radius: 8px; cursor: pointer; z-index: 100; font-weight: bold; }

        /* LAUNCHER */
        #launcher { justify-content: center; align-items: center; background: radial-gradient(circle, #1a1a1a 0%, #000 100%); }
        .logo { font-size: 48px; font-weight: 800; margin-bottom: 5px; letter-spacing: -1px; }
        .logo span { color: #2ecc71; }
        #ai-status { color: #666; font-size: 14px; margin-bottom: 40px; font-family: monospace; }
        
        .btn-group { display: flex; flex-direction: column; gap: 15px; }
        .main-btn { width: 280px; padding: 18px; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; text-transform: uppercase; }
        .btn-term { background: #2ecc71; color: #000; box-shadow: 0 4px 15px rgba(46, 204, 113, 0.3); }
        .btn-admin { background: #3498db; color: #fff; }
        .main-btn:disabled { opacity: 0.2; cursor: wait; }

        /* TERMINAL */
        #user-terminal { background: #000; }
        .cam-wrapper { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        video { width: 90%; max-width: 500px; border-radius: 24px; border: 2px solid #2ecc71; transform: scaleX(-1); background: #111; }
        #status-box { margin-top: 25px; font-size: 20px; font-weight: bold; font-family: monospace; color: #2ecc71; height: 30px; }

        /* ADMIN PANEL */
        #admin-dashboard { padding-top: 80px; background: #0f0f0f; }
        .admin-grid { display: grid; grid-template-columns: 1fr 350px; gap: 20px; padding: 20px; height: 90vh; }
        
        /* Таблица календаря */
        .scroll-area { background: #151515; border-radius: 12px; padding: 15px; overflow: auto; border: 1px solid #222; }
        .cal-table { width: 100%; border-collapse: collapse; color: #ccc; font-size: 12px; }
        .cal-table th { background: #2ecc71; color: #000; padding: 10px; position: sticky; top: 0; }
        .cal-table td { border: 1px solid #222; padding: 10px; text-align: center; }
        .present { background: rgba(46, 204, 113, 0.2) !important; color: #2ecc71; font-weight: bold; }

        /* Сайдбар */
        .sidebar { background: #151515; border-radius: 12px; padding: 20px; border: 1px solid #222; display: flex; flex-direction: column; gap: 20px; }
        .input-group input { width: 100%; padding: 12px; background: #000; border: 1px solid #333; color: #fff; border-radius: 8px; margin-bottom: 10px; }
        .worker-card { display: flex; align-items: center; gap: 12px; background: #1a1a1a; padding: 10px; border-radius: 8px; margin-bottom: 10px; }
        .worker-card img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
    </style>
</head>
<body>

    <!-- Launcher -->
    <div id="launcher" class="screen active">
        <div class="logo">BioID <span>ELITE</span></div>
        <div id="ai-status">ИНИЦИАЛИЗАЦИЯ НЕЙРОСЕТИ...</div>
        <div class="btn-group">
            <button id="btn-term" class="main-btn btn-term" onclick="ui.showScreen('user-terminal')" disabled>Вход по FaceID</button>
            <button id="btn-admin" class="main-btn btn-admin" onclick="ui.showAdmin()" disabled>Панель управления</button>
        </div>
    </div>

    <!-- User Terminal -->
    <div id="user-terminal" class="screen">
        <button class="btn-back" onclick="location.reload()">← ВЫХОД</button>
        <div class="cam-wrapper">
            <video id="video" autoplay playsinline muted></video>
            <div id="status-box">SCANNING...</div>
        </div>
    </div>

    <!-- Admin Dashboard -->
    <div id="admin-dashboard" class="screen">
        <button class="btn-back" onclick="location.reload()">← НАЗАД</button>
        <div class="admin-grid">
            <div class="scroll-area" id="calendar-view">
                <!-- Календарь генерится тут -->
            </div>
            <div class="sidebar">
                <h3>Регистрация</h3>
                <div class="input-group">
                    <input type="text" id="reg-name" placeholder="ФИО сотрудника">
                    <input type="file" id="reg-file" accept="image/*">
                    <button class="main-btn btn-term" style="width:100%" onclick="core.registerWorker()">Добавить в базу</button>
                </div>
                <hr style="border:0; border-top:1px solid #333">
                <h3>Сотрудники</h3>
                <div id="workers-list"></div>
            </div>
        </div>
    </div>

    <script>
        // --- БАЗА ДАННЫХ ---
        const db = {
            async init() {
                return new Promise(r => {
                    const req = indexedDB.open("BioDatabase", 1);
                    req.onupgradeneeded = e => {
                        const d = e.target.result;
                        d.createObjectStore("workers", { keyPath: "name" });
                        d.createObjectStore("logs", { keyPath: "id", autoIncrement: true });
                    };
                    req.onsuccess = e => { this.instance = e.target.result; r(); };
                });
            },
            async save(store, data) { return new Promise(r => this.instance.transaction(store, "readwrite").objectStore(store).put(data).onsuccess = r); },
            async getAll(store) { return new Promise(r => this.instance.transaction(store).objectStore(store).getAll().onsuccess = e => r(e.target.result)); }
        };

        // --- ЛОГИКА ИИ ---
        const core = {
            modelsPath: './models', // ПУТЬ К ТВОЕЙ ПАПКЕ С МОДЕЛЯМИ

            async loadAI() {
                try {
                    await faceapi.nets.tinyFaceDetector.loadFromUri(this.modelsPath);
                    await faceapi.nets.faceLandmark68Net.loadFromUri(this.modelsPath);
                    await faceapi.nets.faceRecognitionNet.loadFromUri(this.modelsPath);
                    document.getElementById('ai-status').innerText = "СИСТЕМА ГОТОВА / V4.2";
                    document.querySelectorAll('.main-btn').forEach(b => b.disabled = false);
                } catch (err) {
                    document.getElementById('ai-status').innerText = "ОШИБКА ЗАГРУЗКИ МОДЕЛЕЙ";
                    console.error(err);
                }
            },

            async registerWorker() {
                const name = document.getElementById('reg-name').value;
                const file = document.getElementById('reg-file').files[0];
                if (!name || !file) return alert("Заполните все поля");

                const img = await faceapi.bufferToImage(file);
                const detection = await faceapi.detectSingleFace(img, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptor();
                
                if (detection) {
                    const reader = new FileReader();
                    reader.onload = async () => {
                        await db.save("workers", { 
                            name, 
                            descriptor: Array.from(detection.descriptor), 
                            photo: reader.result 
                        });
                        alert("Сотрудник успешно добавлен!");
                        ui.showAdmin();
                    };
                    reader.readAsDataURL(file);
                } else {
                    alert("Лицо не обнаружено на фото");
                }
            },

            async startRecognition() {
                const video = document.getElementById('video');
                const stream = await navigator.mediaDevices.getUserMedia({ video: {} });
                video.srcObject = stream;

                const workers = await db.getAll("workers");
                const statusBox = document.getElementById('status-box');

                setInterval(async () => {
                    const detection = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptor();
                    
                    if (detection && workers.length > 0) {
                        for (let worker of workers) {
                            const dist = faceapi.euclideanDistance(detection.descriptor, new Float32Array(worker.descriptor));
                            if (dist < 0.5) {
                                statusBox.innerText = "УЗНАН: " + worker.name;
                                statusBox.style.color = "#2ecc71";
                                await db.save("logs", { worker: worker.name, date: new Date().toISOString().split('T')[0] });
                                return;
                            }
                        }
                        statusBox.innerText = "НЕИЗВЕСТНЫЙ";
                        statusBox.style.color = "#e74c3c";
                    }
                }, 1000);
            }
        };

        // --- ИНТЕРФЕЙС ---
        const ui = {
            showScreen(id) {
                document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
                document.getElementById(id).classList.add('active');
                if (id === 'user-terminal') core.startRecognition();
            },

            async showAdmin() {
                this.showScreen('admin-dashboard');
                const workers = await db.getAll("workers");
                const logs = await db.getAll("logs");
                
                // Список сотрудников в сайдбаре
                document.getElementById('workers-list').innerHTML = workers.map(w => `
                    <div class="worker-card">
                        <img src="${w.photo}">
                        <span>${w.name}</span>
                    </div>
                `).join('');

                // Календарь (упрощенный пример на текущий месяц)
                let html = '<table class="cal-table"><tr><th>Имя</th>';
                for(let i=1; i<=30; i++) html += `<th>${i}</th>`;
                html += '</tr>';

                workers.forEach(w => {
                    html += `<tr><td>${w.name}</td>`;
                    for(let i=1; i<=30; i++) {
                        const dateStr = `2026-04-${String(i).padStart(2,'0')}`; // Пример апреля
                        const isPresent = logs.some(l => l.worker === w.name && l.date === dateStr);
                        html += `<td class="${isPresent ? 'present' : ''}">${isPresent ? '✓' : ''}</td>`;
                    }
                    html += '</tr>';
                });
                document.getElementById('calendar-view').innerHTML = html + '</table>';
            }
        };

        window.onload = async () => {
            await db.init();
            core.loadAI();
        };
    </script>
</body>
</html>
