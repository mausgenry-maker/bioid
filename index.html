<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BioID Ultimate v3.0</title>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        :root { --p: #00ff88; --bg: #000; --card: #111; --red: #ff4d4d; --yellow: #f1c40f; --grey: #2a2a2a; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; font-family: -apple-system, system-ui, sans-serif; height: 100vh; overflow: hidden; }

        .screen { display: none; width: 100%; height: 100%; position: fixed; flex-direction: column; padding-bottom: 90px; }
        .screen.active { display: flex; }
        
        .nav { position: fixed; bottom: 0; width: 100%; height: 80px; background: #0a0a0a; display: flex; border-top: 1px solid #222; z-index: 1000; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 11px; color: #555; cursor: pointer; }
        .nav-item.active { color: var(--p); }
        .nav-item b { font-size: 24px; margin-bottom: 4px; }

        .video-box { width: 100%; height: 50vh; background: #111; position: relative; border-bottom: 2px solid var(--p); display: flex; align-items: center; justify-content: center; overflow: hidden; }
        #video { width: 100%; height: 100%; object-fit: cover; }
        #cam-btn { position: absolute; z-index: 99; padding: 20px 40px; background: var(--p); color: #000; border: none; border-radius: 50px; font-weight: 900; box-shadow: 0 0 30px rgba(0,255,136,0.5); }

        .scroll { flex: 1; overflow-y: auto; padding: 15px; -webkit-overflow-scrolling: touch; }
        .card { background: var(--card); border-radius: 20px; padding: 18px; margin-bottom: 12px; border: 1px solid #222; }

        .cal-row { display: flex; gap: 8px; overflow-x: auto; padding: 10px 0; }
        .day { min-width: 44px; height: 44px; border-radius: 12px; background: var(--grey); display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; cursor: pointer; }
        .day.green { background: var(--p) !important; color: #000; }
        .day.red { background: var(--red) !important; color: #fff; }
        .day.yellow { background: var(--yellow) !important; color: #000; }

        #overlay, #edit-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 5000; display: none; align-items: center; justify-content: center; flex-direction: column; padding: 30px; }
        .btn { padding: 18px; border: none; border-radius: 15px; font-weight: bold; width: 100%; font-size: 16px; margin-bottom: 10px; }
        .btn-p { background: var(--p); color: #000; }
        .edit-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; }
        
        input { width: 100%; padding: 16px; background: #1a1a1a; border: 1px solid #333; color: #fff; border-radius: 14px; margin-bottom: 10px; font-size: 16px; }
    </style>
</head>
<body>

    <!-- SCANNER -->
    <div id="scr-scan" class="screen active">
        <div class="video-box">
            <button id="cam-btn">ЗАПУСТИТЬ</button>
            <video id="video" autoplay playsinline muted></video>
        </div>
        <div class="scroll"><h3 id="st-text" style="text-align:center; color:var(--p)">ГОТОВНОСТЬ...</h3></div>
        <div id="overlay">
            <h1 id="u-name" style="margin-bottom: 30px; text-align: center;">---</h1>
            <button class="btn btn-p" id="btn-in">ВХОД</button>
            <button class="btn" style="background:var(--red); color:#fff" id="btn-out">ВЫХОД</button>
            <button class="btn" style="background:none; color:#666" id="btn-cancel">ОТМЕНА</button>
        </div>
    </div>

    <!-- MODAL -->
    <div id="edit-modal">
        <h2 id="edit-title" style="margin-bottom: 25px; text-align: center; color: var(--p);">ВЫБОР СТАТУСА</h2>
        <div class="edit-grid">
            <button class="btn" style="background:var(--yellow); color:#000" onclick="app.setLog('YELLOW')">ВХОД</button>
            <button class="btn" style="background:var(--p); color:#000" onclick="app.setLog('GREEN')">ВЫХОД</button>
            <button class="btn" style="background:var(--red); color:#fff" onclick="app.setLog('RED')">ПРОГУЛ</button>
            <button class="btn" style="background:var(--grey); color:#fff" onclick="app.setLog('CLEAR')">СБРОС</button>
        </div>
        <button class="btn" style="background:none; color:#666; margin-top:10px" onclick="app.closeEdit()">ЗАКРЫТЬ</button>
    </div>

    <!-- BASE -->
    <div id="scr-base" class="screen">
        <div class="header" style="padding:20px; border-bottom:1px solid #222; display:flex; justify-content:space-between; align-items:center">
            <h2 id="cur-m-name">ЖУРНАЛ</h2>
            <button onclick="app.download()" style="background:none; border:none; color:var(--p); font-weight:bold">ОТЧЕТ .TXT</button>
        </div>
        <div class="scroll" id="base-list"></div>
    </div>

    <!-- STAFF -->
    <div id="scr-staff" class="screen">
        <div class="header" style="padding:20px; border-bottom:1px solid #222"><h2>ШТАТ</h2></div>
        <div class="scroll">
            <div class="card">
                <input type="text" id="reg-n" placeholder="Имя Фамилия">
                <input type="number" id="reg-rate" placeholder="Ставка в час">
                <input type="file" id="reg-f" accept="image/*" capture="user">
                <button class="btn btn-p" onclick="app.reg()">ДОБАВИТЬ В БАЗУ</button>
            </div>
            <div id="staff-list"></div>
        </div>
    </div>

    <!-- NAV -->
    <div class="nav">
        <div class="nav-item active" onclick="app.ui('scr-scan', this)"><b>📷</b>СКАН</div>
        <div class="nav-item" onclick="app.ui('scr-base', this)"><b>📅</b>БАЗА</div>
        <div class="nav-item" onclick="app.ui('scr-staff', this)"><b>👥</b>ШТАТ</div>
    </div>

<script>
let db;
let viewDate = new Date();
let curU = null;
let editCtx = { name: null, date: null };
let modelsReady = false;

const app = {
    async init() {
        const req = indexedDB.open("BioID_Ultimate_v95", 1);
        req.onupgradeneeded = e => {
            const d = e.target.result;
            d.createObjectStore("workers", {keyPath: "name"});
            d.createObjectStore("logs", {keyPath: "id", autoIncrement: true});
        };
        req.onsuccess = e => { db = e.target.result; this.loadModels(); };

        document.getElementById('cam-btn').onclick = () => this.startCamera();
        document.getElementById('btn-in').onclick = () => this.log('IN');
        document.getElementById('btn-out').onclick = () => this.log('OUT');
        document.getElementById('btn-cancel').onclick = () => this.closeOverlay();
    },

    async loadModels() {
        const p = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model';
        try {
            await faceapi.nets.tinyFaceDetector.loadFromUri(p);
            await faceapi.nets.faceLandmark68Net.loadFromUri(p);
            await faceapi.nets.faceRecognitionNet.loadFromUri(p);
            modelsReady = true;
            document.getElementById('st-text').innerText = "ГОТОВО";
        } catch(e) { document.getElementById('st-text').innerText = "ОШИБКА СЕТИ"; }
    },

    async startCamera() {
        const v = document.getElementById('video');
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "user", width: {ideal: 320} } 
            });
            v.srcObject = stream;
            document.getElementById('cam-btn').style.display = 'none';
            this.runScanner();
        } catch(err) { alert("Камера недоступна"); }
    },

    runScanner() {
        const v = document.getElementById('video');
        const options = new faceapi.TinyFaceDetectorOptions({ inputSize: 128, scoreThreshold: 0.5 });
        setInterval(async () => {
            if(curU || !modelsReady || !document.getElementById('scr-scan').classList.contains('active')) return;
            const det = await faceapi.detectSingleFace(v, options).withFaceLandmarks().withFaceDescriptor();
            if(det) {
                const ws = await this.get("workers");
                for(let w of ws) {
                    const dist = faceapi.euclideanDistance(det.descriptor, new Float32Array(w.desc));
                    if(dist < 0.42) {
                        curU = w;
                        document.getElementById('u-name').innerText = w.name;
                        document.getElementById('overlay').style.display = 'flex';
                        break;
                    }
                }
            }
        }, 400);
    },

    ui(id, el) {
        document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        const target = document.getElementById(id);
        target.style.display = 'flex';
        target.classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        if(el) el.classList.add('active');
        if(id === 'scr-base') this.renderB();
        if(id === 'scr-staff') this.renderS();
    },

    edit(n, d) {
        editCtx = { name: n, date: d };
        document.getElementById('edit-title').innerText = n.split(' ')[0] + " | " + d.split('-')[2];
        document.getElementById('edit-modal').style.display = 'flex';
    },

    closeEdit() { document.getElementById('edit-modal').style.display = 'none'; },

    async setLog(action) {
        const { name, date } = editCtx;
        
        // 1. Сначала удаляем все старые логи за этот день
        const allLogs = await this.get("logs");
        const tx = db.transaction("logs", "readwrite");
        const store = tx.objectStore("logs");
        
        allLogs.filter(l => l.name === name && l.date === date).forEach(l => store.delete(l.id));

        // 2. В этой же транзакции добавляем новые
        if (action === 'YELLOW') {
            store.add({ name, date, type: 'IN', ts: Date.now() });
        } else if (action === 'GREEN') {
            store.add({ name, date, type: 'IN', ts: Date.now() });
            store.add({ name, date, type: 'OUT', ts: Date.now() + 28800000 });
        } else if (action === 'RED') {
            store.add({ name, date, type: 'ABSENT' });
        }

        tx.oncomplete = () => {
            this.renderB(); // Перерисовываем
            this.closeEdit();
        };
    },

    async renderB() {
        const ws = await this.get("workers");
        const ls = await this.get("logs");
        const dim = new Date(viewDate.getFullYear(), viewDate.getMonth() + 1, 0).getDate();
        
        const mNames = ["ЯНВАРЬ","ФЕВРАЛЬ","МАРТ","АПРЕЛЬ","МАЙ","ИЮНЬ","ИЮЛЬ","АВГУСТ","СЕНТЯБРЬ","ОКТЯБРЬ","НОЯБРЬ","ДЕКАБРЬ"];
        document.getElementById('cur-m-name').innerText = `${mNames[viewDate.getMonth()]} ${viewDate.getFullYear()}`;

        document.getElementById('base-list').innerHTML = ws.map(w => {
            let dH = '', totalH = 0;
            for(let i=1; i<=dim; i++) {
                const ds = `${viewDate.getFullYear()}-${String(viewDate.getMonth()+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
                const dl = ls.filter(l => l.name === w.name && l.date === ds);
                
                const cin = dl.find(l => l.type === 'IN');
                const cout = dl.find(l => l.type === 'OUT');
                const isAbs = dl.some(l => l.type === 'ABSENT');

                if(cin && cout) totalH += (cout.ts - cin.ts) / 3600000;
                
                // ПРИОРИТЕТ ЦВЕТОВ
                let st = '';
                if (isAbs) st = 'red';
                else if (cin && cout) st = 'green';
                else if (cin) st = 'yellow';

                const safeName = w.name.replace(/'/g, "\\'");
                dH += `<div class="day ${st}" onclick="app.edit('${safeName}','${ds}')">${i}</div>`;
            }
            return `<div class="card"><b>${w.name}</b> <span style="float:right; color:var(--p)">${(totalH * w.rate).toFixed(0)} ₽</span><div class="cal-row">${dH}</div></div>`;
        }).join('');
    },

    async reg() {
        const n = document.getElementById('reg-n').value, r = document.getElementById('reg-rate').value, f = document.getElementById('reg-f').files[0];
        if(!n || !f || !r) return alert("Заполни поля");
        const img = await faceapi.bufferToImage(f);
        const det = await faceapi.detectSingleFace(img, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptor();
        if(det) {
            db.transaction("workers", "readwrite").objectStore("workers").put({
                name: n, rate: parseFloat(r), desc: Array.from(det.descriptor)
            });
            alert("Добавлен!"); this.renderS();
        } else alert("Лицо не найдено!");
    },

    async renderS() {
        const ws = await this.get("workers");
        document.getElementById('staff-list').innerHTML = ws.map(w => `
            <div class="card" style="display:flex; justify-content:space-between; align-items:center">
                <b>${w.name}</b>
                <button onclick="app.delS('${w.name}')" style="background:none; border:none; color:var(--red); font-weight:bold">УДАЛИТЬ</button>
            </div>
        `).join('');
    },

    delS(n) { if(confirm("Удалить?")) { db.transaction("workers","readwrite").objectStore("workers").delete(n); this.renderS(); } },

    async log(t) {
        const d = new Date().toISOString().split('T')[0];
        const tx = db.transaction("logs", "readwrite");
        tx.objectStore("logs").add({ name: curU.name, date: d, type: t, ts: Date.now() });
        tx.oncomplete = () => this.closeOverlay();
    },

    closeOverlay() { curU = null; document.getElementById('overlay').style.display = 'none'; },
    get(n) { return new Promise(r => db.transaction(n).objectStore(n).getAll().onsuccess = e => r(e.target.result)); },
    
    async download() {
        const ws = await this.get("workers");
        const ls = await this.get("logs");
        let t = `ОТЧЕТ ЗА ${viewDate.getMonth()+1}/${viewDate.getFullYear()}\n\n`;
        ws.forEach(w => {
            let h = 0;
            const wl = ls.filter(l => l.name === w.name && new Date(l.date).getMonth() === viewDate.getMonth());
            const days = [...new Set(wl.map(l => l.date))];
            days.forEach(d => {
                const dayL = wl.filter(l => l.date === d);
                const cin = dayL.find(l => l.type === 'IN'), cout = dayL.find(l => l.type === 'OUT');
                if(cin && cout) h += (cout.ts - cin.ts) / 3600000;
            });
            t += `${w.name}: ${h.toFixed(1)}ч | ${(h * w.rate).toFixed(0)} ₽\n`;
        });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(new Blob([t])); a.download = "report.txt"; a.click();
    }
};
window.onload = () => app.init();
</script>
</body>
</html>
