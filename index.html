<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <title>BioID Fix Table</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: #000; color: #fff; height: 100vh; overflow: hidden; }
        .screen { display: none; width: 100%; height: 100%; position: fixed; flex-direction: column; background: #000; }
        .screen.active { display: flex; }
        
        /* Кнопки */
        .btn { padding: 15px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; width: 80%; max-width: 280px; margin: 10px auto; display: block; }
        .btn-primary { background: #2ecc71; color: #000; }
        .btn-back { background: none; color: #fff; text-align: left; padding: 20px; width: auto; margin: 0; }
        
        /* Видео */
        .v-container { width: 85%; max-width: 350px; aspect-ratio: 3/4; border: 2px solid #2ecc71; border-radius: 20px; overflow: hidden; margin: auto; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        
        /* Таблица админки */
        .admin-wrap { flex: 1; overflow-y: auto; padding: 20px; }
        .form { background: #111; padding: 15px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #222; }
        input { width: 100%; padding: 12px; margin-bottom: 10px; background: #000; border: 1px solid #333; color: #fff; border-radius: 8px; }
        
        table { width: 100%; border-collapse: collapse; background: #0a0a0a; border-radius: 10px; overflow: hidden; }
        th { background: #1a1a1a; color: #2ecc71; text-align: left; padding: 12px; font-size: 12px; text-transform: uppercase; }
        td { padding: 12px; border-bottom: 1px solid #111; font-size: 14px; }
        .row-pic { width: 40px; height: 40px; border-radius: 5px; object-fit: cover; display: block; }
    </style>
</head>
<body>

    <!-- Меню -->
    <div id="launcher" class="screen active">
        <div style="margin: auto; text-align: center; width: 100%;">
            <h1 style="letter-spacing: 3px;">BIOID <span style="color:#2ecc71">SYSTEM</span></h1>
            <p id="msg" style="color: #444; margin: 20px 0; font-size: 12px;">ЗАГРУЗКА ИИ...</p>
            <button id="b1" class="btn btn-primary" onclick="ui.show('terminal')" disabled>ВОЙТИ (СКАНЕР)</button>
            <button id="b2" class="btn" style="background:#1a1a1a; color:#fff" onclick="ui.show('admin')" disabled>АДМИН-ПАНЕЛЬ</button>
        </div>
    </div>

    <!-- Сканер -->
    <div id="terminal" class="screen">
        <button class="btn btn-back" onclick="ui.show('launcher')">← НАЗАД</button>
        <div class="v-container"><video id="video" autoplay playsinline muted></video></div>
        <div id="st" style="text-align:center; color:#2ecc71; padding:20px; font-family: monospace;">СКАНЕР АКТИВЕН</div>
    </div>

    <!-- Админка -->
    <div id="admin" class="screen">
        <button class="btn btn-back" onclick="ui.show('launcher')">← НАЗАД</button>
        <div class="admin-wrap">
            <div class="form">
                <input type="text" id="in-name" placeholder="ФИО сотрудника">
                <input type="file" id="in-file" accept="image/*">
                <button id="reg-btn" class="btn btn-primary" style="width:100%; margin: 10px 0 0;" onclick="engine.reg()">ДОБАВИТЬ В БАЗУ</button>
            </div>

            <table>
                <thead>
                    <tr>
                        <th>Фото</th>
                        <th>Имя</th>
                        <th>Статус</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    <!-- Сюда попадут данные -->
                </tbody>
            </table>
        </div>
    </div>

<script>
// Чистим кэш старых скриптов
if('serviceWorker' in navigator) {
    navigator.serviceWorker.getRegistrations().then(rs => rs.forEach(r => r.unregister()));
}

const db = {
    async init() {
        return new Promise(res => {
            // Повышаем версию базы, чтобы сбросить ошибки
            const req = indexedDB.open('BioDatabase_V5', 5);
            req.onupgradeneeded = e => {
                const d = e.target.result;
                if(!d.objectStoreNames.contains('users')) d.createObjectStore('users', {keyPath:'name'});
            };
            req.onsuccess = e => { this.i = e.target.result; res(); };
        });
    },
    async add(u) {
        const t = this.i.transaction('users','readwrite');
        return new Promise(res => {
            t.objectStore('users').put(u).onsuccess = () => res();
        });
    },
    async get() {
        return new Promise(res => {
            this.i.transaction('users').objectStore('users').getAll().onsuccess = e => res(e.target.result || []);
        });
    }
};

const engine = {
    async init() {
        try {
            const url = './models';
            await Promise.all([
                faceapi.nets.tinyFaceDetector.loadFromUri(url),
                faceapi.nets.faceLandmark68Net.loadFromUri(url),
                faceapi.nets.faceRecognitionNet.loadFromUri(url)
            ]);
            document.getElementById('msg').textContent = "СИСТЕМА ГОТОВА";
            document.getElementById('b1').disabled = document.getElementById('b2').disabled = false;
        } catch(e) { document.getElementById('msg').textContent = "ОШИБКА ФАЙЛОВ МОДЕЛЕЙ"; }
    },
    async reg() {
        const name = document.getElementById('in-name').value;
        const file = document.getElementById('in-file').files[0];
        if(!name || !file) return alert("Введите имя и выберите фото");
        
        const btn = document.getElementById('reg-btn');
        btn.disabled = true; btn.textContent = "АНАЛИЗ ЛИЦА...";

        try {
            const img = await faceapi.bufferToImage(file);
            const res = await faceapi.detectSingleFace(img, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptor();
            
            if(res) {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = async () => {
                    await db.add({name, desc: Array.from(res.descriptor), pic: reader.result});
                    alert("СОТРУДНИК ДОБАВЛЕН");
                    document.getElementById('in-name').value = "";
                    ui.render();
                    btn.disabled = false; btn.textContent = "ДОБАВИТЬ В БАЗУ";
                };
            } else {
                alert("ЛИЦО НЕ НАЙДЕНО");
                btn.disabled = false; btn.textContent = "ДОБАВИТЬ В БАЗУ";
            }
        } catch(e) { alert("ОШИБКА ИИ"); btn.disabled = false; }
    },
    async scan() {
        if(ui.cur !== 'terminal') return;
        const v = document.getElementById('video'), users = await db.get();
        if(users.length && v.readyState === 4) {
            const res = await faceapi.detectSingleFace(v, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptor();
            if(res) {
                for(let u of users) {
                    const d = faceapi.euclideanDistance(res.desc, new Float32Array(u.desc));
                    if(d < 0.55) { 
                        document.getElementById('st').innerHTML = "ДОСТУП: <b style='color:#fff'>" + u.name + "</b>";
                        return setTimeout(() => {
                            document.getElementById('st').textContent = "ПОИСК...";
                            this.scan();
                        }, 3000);
                    }
                }
            }
        }
        setTimeout(() => this.scan(), 500);
    }
};

const ui = {
    cur: 'launcher',
    show(id) {
        this.cur = id;
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'terminal') {
            navigator.mediaDevices.getUserMedia({video:{facingMode:'user'}}).then(s => {
                document.getElementById('video').srcObject = s;
                engine.scan();
            });
        } else if(id === 'admin') this.render();
    },
    async render() {
        const users = await db.get();
        const tbody = document.getElementById('table-body');
        if(!users.length) {
            tbody.innerHTML = '<tr><td colspan="3" style="text-align:center; color:#444">База пуста</td></tr>';
            return;
        }
        tbody.innerHTML = users.map(u => `
            <tr>
                <td><img src="${u.pic}" class="row-pic"></td>
                <td><b>${u.name}</b></td>
                <td style="color:#2ecc71">Active</td>
            </tr>
        `).join('');
    }
};

window.onload = async () => { 
    await db.init(); 
    engine.init(); 
};
</script>
</body>
</html>
