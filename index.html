<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <title>BioID Elite GH</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, system-ui, sans-serif; background: #000; color: #fff; height: 100vh; overflow: hidden; }
        
        /* Экраны */
        .screen { display: none; width: 100%; height: 100%; position: fixed; flex-direction: column; background: #000; }
        .screen.active { display: flex; }

        /* Кнопки */
        .btn { padding: 18px; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; width: 85%; max-width: 300px; margin: 10px auto; font-size: 14px; text-transform: uppercase; transition: 0.3s; }
        .btn:disabled { opacity: 0.2; cursor: not-allowed; }
        .btn-primary { background: #2ecc71; color: #000; box-shadow: 0 4px 15px rgba(46,204,113,0.2); }
        .btn-secondary { background: #1a1a1a; color: #fff; border: 1px solid #333; }
        
        /* Камера и Терминал */
        .terminal { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        .v-container { position: relative; width: 85%; max-width: 380px; aspect-ratio: 3/4; border: 2px solid #2ecc71; border-radius: 20px; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        .scan-line { position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: #2ecc71; box-shadow: 0 0 15px #2ecc71; animation: scan 3s infinite linear; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
        #status { margin-top: 15px; color: #2ecc71; font-family: monospace; font-size: 14px; text-align: center; }

        /* Админка */
        .header { padding: 20px; display: flex; align-items: center; border-bottom: 1px solid #222; }
        .admin-content { flex: 1; padding: 20px; overflow-y: auto; }
        input[type="text"] { width: 100%; padding: 15px; background: #111; border: 1px solid #333; color: #fff; border-radius: 10px; margin-bottom: 15px; }
        .worker-card { display: flex; align-items: center; background: #0a0a0a; padding: 12px; border-radius: 12px; margin-bottom: 10px; border: 1px solid #1a1a1a; }
        .worker-card img { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; margin-right: 15px; border: 1px solid #333; }

        /* Модалка */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; }
        .modal.active { display: flex; }
        .modal-box { background: #0a0a0a; width: 80%; max-width: 300px; padding: 30px; border-radius: 25px; text-align: center; border: 1px solid #2ecc71; }
    </style>
</head>
<body>

    <!-- Главная -->
    <div id="launcher" class="screen active">
        <div style="margin: auto; text-align: center;">
            <h1 style="letter-spacing: 4px; margin-bottom: 5px;">BIOID <span style="color:#2ecc71">ELITE</span></h1>
            <p id="init-text" style="color: #444; font-size: 12px; margin-bottom: 40px;">ЗАГРУЗКА ЯДРА ИИ...</p>
            <button id="btn-scan" class="btn btn-primary" onclick="ui.show('terminal')" disabled>СКАНЕР ЛИЦА</button>
            <button id="btn-admin" class="btn btn-secondary" onclick="ui.show('admin')" disabled>БАЗА ДАННЫХ</button>
        </div>
    </div>

    <!-- Сканер -->
    <div id="terminal" class="screen">
        <div class="header" onclick="ui.show('launcher')"> ✕ НАЗАД </div>
        <div class="terminal">
            <div class="v-container">
                <div class="scan-line"></div>
                <video id="video" autoplay playsinline muted></video>
            </div>
            <div id="status">ИНИЦИАЛИЗАЦИЯ...</div>
        </div>
    </div>

    <!-- Админка -->
    <div id="admin" class="screen">
        <div class="header" onclick="ui.show('launcher')"> ✕ НАЗАД </div>
        <div class="admin-content">
            <div style="background:#111; padding:20px; border-radius:15px; margin-bottom:25px;">
                <input type="text" id="reg-name" placeholder="ИМЯ СОТРУДНИКА">
                <input type="file" id="reg-file" accept="image/*" style="margin-bottom:15px; font-size:12px; color:#555;">
                <button id="reg-btn" class="btn btn-primary" style="width:100%; margin:0" onclick="engine.register()">СОХРАНИТЬ</button>
            </div>
            <h3 style="color:#2ecc71; font-size:12px; margin-bottom:15px;">ЗАРЕГИСТРИРОВАНЫ:</h3>
            <div id="worker-list"></div>
        </div>
    </div>

    <!-- Модалка успеха -->
    <div id="modal" class="modal">
        <div class="modal-box">
            <div style="font-size:40px; color:#2ecc71; margin-bottom:15px;">✓</div>
            <h2 id="modal-name">ДОСТУП</h2>
            <p id="modal-time" style="color:#555; font-size:13px; margin: 10px 0 25px;"></p>
            <button class="btn btn-primary" style="width:100%; margin:0" onclick="ui.closeModal()">OK</button>
        </div>
    </div>

<script>
const db = {
    async init() {
        return new Promise(res => {
            const req = indexedDB.open('BioID_GH_DB', 1);
            req.onupgradeneeded = e => e.target.result.createObjectStore('workers', { keyPath: 'name' });
            req.onsuccess = e => { this.instance = e.target.result; res(); };
        });
    },
    async save(obj) {
        const tx = this.instance.transaction('workers', 'readwrite');
        await tx.objectStore('workers').put(obj);
    },
    async getAll() {
        return new Promise(res => {
            this.instance.transaction('workers').objectStore('workers').getAll().onsuccess = e => res(e.target.result || []);
        });
    }
};

const engine = {
    async init() {
        const MODEL_URL = './models'; // Относительный путь для GitHub
        try {
            await Promise.all([
                faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
                faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
                faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
            ]);
            document.getElementById('init-text').textContent = "СИСТЕМА АКТИВНА";
            document.getElementById('btn-scan').disabled = false;
            document.getElementById('btn-admin').disabled = false;
        } catch(e) {
            document.getElementById('init-text').textContent = "ОШИБКА МОДЕЛЕЙ";
            console.error(e);
        }
    },

    async register() {
        const name = document.getElementById('reg-name').value;
        const file = document.getElementById('reg-file').files[0];
        const btn = document.getElementById('reg-btn');
        if(!name || !file) return alert("Введите имя и фото");

        btn.disabled = true;
        btn.textContent = "АНАЛИЗ...";

        const img = await faceapi.bufferToImage(file);
        const dec = await faceapi.detectSingleFace(img, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptor();

        if(dec) {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = async () => {
                await db.save({
                    name: name,
                    descriptor: Array.from(dec.descriptor),
                    photo: reader.result // Сохраняем как Base64 для GitHub
                });
                alert("УСПЕШНО");
                document.getElementById('reg-name').value = "";
                ui.renderList();
                btn.disabled = false;
                btn.textContent = "СОХРАНИТЬ";
            };
        } else {
            alert("ЛИЦО НЕ НАЙДЕНО");
            btn.disabled = false;
            btn.textContent = "СОХРАНИТЬ";
        }
    },

    async process() {
        if(ui.current !== 'terminal') return;
        const video = document.getElementById('video');
        const workers = await db.getAll();

        if(workers.length > 0 && video.readyState === 4) {
            const dec = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptor();
            if(dec) {
                let match = { name: null, dist: 0.55 };
                workers.forEach(w => {
                    const dist = faceapi.euclideanDistance(dec.descriptor, new Float32Array(w.descriptor));
                    if(dist < match.dist) match = { name: w.name, dist };
                });
                if(match.name) ui.showMatch(match.name);
            }
        }
        setTimeout(() => this.process(), 500);
    }
};

const ui = {
    current: 'launcher',
    show(id) {
        this.current = id;
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'terminal') {
            navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } })
                .then(s => { document.getElementById('video').srcObject = s; engine.process(); });
        } else if(id === 'admin') this.renderList();
    },
    async renderList() {
        const workers = await db.getAll();
        document.getElementById('worker-list').innerHTML = workers.map(w => `
            <div class="worker-card">
                <img src="${w.photo}">
                <div>
                    <div style="font-weight:bold">${w.name}</div>
                    <div style="font-size:10px; color:#2ecc71">БИОМЕТРИЯ OK</div>
                </div>
            </div>
        `).join('');
    },
    showMatch(name) {
        if(document.getElementById('modal').classList.contains('active')) return;
        document.getElementById('modal-name').textContent = name;
        document.getElementById('modal-time').textContent = new Date().toLocaleTimeString();
        document.getElementById('modal').classList.add('active');
    },
    closeModal() { document.getElementById('modal').classList.remove('active'); }
};

window.onload = () => { db.init(); engine.init(); };
</script>
</body>
</html>
