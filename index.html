<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <title>BioID Debug</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: #000; color: #fff; height: 100vh; overflow: hidden; }
        .screen { display: none; width: 100%; height: 100%; position: fixed; flex-direction: column; text-align: center; }
        .screen.active { display: flex; }
        .btn { padding: 18px; border: none; border-radius: 15px; font-weight: bold; width: 80%; max-width: 300px; margin: 10px auto; display: block; }
        .btn-primary { background: #2ecc71; color: #000; }
        .btn:disabled { background: #222; color: #555; }
        #log { font-family: monospace; font-size: 10px; color: #ff4444; padding: 10px; white-space: pre-wrap; }
        video { width: 90%; max-width: 400px; border: 2px solid #2ecc71; border-radius: 20px; transform: scaleX(-1); margin-top: 20px; }
    </style>
</head>
<body>

<div id="launcher" class="screen active">
    <div style="margin-top: auto; margin-bottom: auto;">
        <h1 style="letter-spacing: 3px;">BIOID</h1>
        <p id="loader-status" style="color: #2ecc71; margin-bottom: 20px;">ПРОВЕРКА МОДЕЛЕЙ...</p>
        <div id="log"></div> <!-- Сюда выведутся ошибки файлов -->
        <button id="btn-scan" class="btn btn-primary" onclick="ui.show('terminal')" disabled>ВХОД</button>
        <button id="btn-admin" class="btn" style="background:#111; color:#fff" onclick="ui.show('admin')" disabled>БАЗА</button>
    </div>
</div>

<div id="terminal" class="screen">
    <div style="padding: 20px; text-align: left;" onclick="ui.show('launcher')">← НАЗАД</div>
    <video id="video" autoplay playsinline muted></video>
    <div id="scan-status" style="margin-top: 20px; color: #2ecc71;">ПОИСК ЛИЦА...</div>
</div>

<div id="admin" class="screen" style="overflow-y: auto; padding: 20px;">
    <div onclick="ui.show('launcher')" style="text-align: left; margin-bottom: 20px;">← НАЗАД</div>
    <div style="background: #111; padding: 20px; border-radius: 15px;">
        <input type="text" id="reg-name" placeholder="ИМЯ" style="width:100%; padding:12px; margin-bottom:10px; background:#000; border:1px solid #333; color:#fff;">
        <input type="file" id="reg-file" accept="image/*" style="margin-bottom:10px; font-size:12px;">
        <button id="reg-btn" class="btn btn-primary" onclick="engine.register()" style="width:100%;">СОХРАНИТЬ</button>
    </div>
    <div id="worker-list" style="margin-top:20px; text-align: left;"></div>
</div>

<script>
const logElement = document.getElementById('log');
function debug(msg) { logElement.textContent += msg + '\n'; }

const db = {
    async init() {
        return new Promise(res => {
            const req = indexedDB.open('BioID_Final', 1);
            req.onupgradeneeded = e => e.target.result.createObjectStore('users', { keyPath: 'name' });
            req.onsuccess = e => { this.instance = e.target.result; res(); };
        });
    },
    async save(user) { const tx = this.instance.transaction('users', 'readwrite'); tx.objectStore('users').put(user); },
    async getAll() { return new Promise(res => { this.instance.transaction('users').objectStore('users').getAll().onsuccess = e => res(e.target.result); }); }
};

const engine = {
    options: new faceapi.TinyFaceDetectorOptions({ inputSize: 160 }),
    async init() {
        try {
            // Исправляем путь: если сайт в корне, то './models', если нет - 'models'[cite: 1]
            const MODEL_URL = window.location.pathname.substring(0, window.location.pathname.lastIndexOf('/')) + '/models';

debug("Загрузка из: " + MODEL_URL);
            
            debug("Загрузка TinyFace...");
            await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
            debug("Загрузка Landmarks...");
            await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);
            debug("Загрузка Recognition...");
            await faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL);

            document.getElementById('loader-status').textContent = "СИСТЕМА ГОТОВА";
            document.getElementById('btn-scan').disabled = false;
            document.getElementById('btn-admin').disabled = false;
            logElement.textContent = ""; 
        } catch (e) {
            debug("ОШИБКА: " + e.message);
            document.getElementById('loader-status').textContent = "ОШИБКА ФАЙЛОВ";
            document.getElementById('loader-status').style.color = "red";
        }
    },

    async register() {
        const name = document.getElementById('reg-name').value;
        const file = document.getElementById('reg-file').files[0];
        if(!name || !file) return alert("Данные!");

        const btn = document.getElementById('reg-btn');
        btn.disabled = true;
        
        try {
            const img = await faceapi.bufferToImage(file);
            const res = await faceapi.detectSingleFace(img, this.options).withFaceLandmarks().withFaceDescriptor();
            
            if(res) {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = async () => {
                    await db.save({ name, descriptor: Array.from(res.descriptor), photo: reader.result });
                    alert("УСПЕХ");
                    ui.renderList();
                    btn.disabled = false;
                };
            } else { alert("ЛИЦО НЕ НАЙДЕНО"); btn.disabled = false; }
        } catch(e) { alert("ОШИБКА ИИ"); btn.disabled = false; }
    },

    async scan() {
        if(ui.screen !== 'terminal') return;
        const video = document.getElementById('video');
        if(video.paused || video.ended) return;

        const res = await faceapi.detectSingleFace(video, this.options).withFaceLandmarks().withFaceDescriptor();
        if(res) {
            const users = await db.getAll();
            for(let u of users) {
                const dist = faceapi.euclideanDistance(res.descriptor, new Float32Array(u.descriptor));
                if(dist < 0.6) {
                    document.getElementById('scan-status').textContent = "ДОСТУП: " + u.name;
                    break;
                }
            }
        }
        setTimeout(() => this.scan(), 300);
    }
};

const ui = {
    screen: 'launcher',
    show(id) {
        this.screen = id;
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'terminal') {
            navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } })
                .then(s => { document.getElementById('video').srcObject = s; engine.scan(); })
                .catch(() => alert("НЕТ КАМЕРЫ"));
        } else if(id === 'admin') this.renderList();
    },
    async renderList() {
        const list = await db.getAll();
        document.getElementById('worker-list').innerHTML = list.map(u => `
            <div style="display:flex; align-items:center; margin-bottom:10px; background:#111; padding:10px; border-radius:10px;">
                <img src="${u.photo}" style="width:40px; height:40px; border-radius:5px; margin-right:10px;">
                ${u.name}
            </div>
        `).join('');
    }
};

window.onload = () => { db.init(); engine.init(); };
</script>
</body>
</html>
