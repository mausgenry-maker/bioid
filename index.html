<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BioID Ultimate Fix</title>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        :root { --p: #00ff88; --bg: #000; --card: #111; --red: #ff4d4d; --yellow: #f1c40f; --grey: #2a2a2a; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; font-family: -apple-system, system-ui, sans-serif; height: 100vh; overflow: hidden; }

        .screen { display: none; width: 100%; height: 100%; position: fixed; flex-direction: column; padding-bottom: 90px; }
        .screen.active { display: flex; }
        
        .nav { position: fixed; bottom: 0; width: 100%; height: 80px; background: #0a0a0a; display: flex; border-top: 1px solid #222; z-index: 1000; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 11px; color: #555; cursor: pointer; }
        .nav-item.active { color: var(--p); }
        .nav-item b { font-size: 24px; margin-bottom: 4px; }

        .video-box { width: 100%; height: 60vh; background: #111; position: relative; border-bottom: 2px solid var(--p); display: flex; align-items: center; justify-content: center; overflow: hidden; }
        #video { width: 100%; height: 100%; object-fit: cover; background: #000; }
        
        #cam-btn { position: absolute; z-index: 99; padding: 20px 40px; background: var(--p); color: #000; border: none; border-radius: 50px; font-weight: 900; font-size: 16px; box-shadow: 0 0 30px rgba(0,255,136,0.5); }

        .scroll { flex: 1; overflow-y: auto; padding: 15px; }
        .card { background: var(--card); border-radius: 20px; padding: 18px; margin-bottom: 12px; border: 1px solid #222; }

        .m-ctrl { display: flex; align-items: center; justify-content: space-between; background: #1a1a1a; border-radius: 12px; margin-bottom: 15px; padding: 5px; }
        .m-btn { padding: 10px 15px; background: #222; border: none; color: #fff; border-radius: 8px; }

        .cal-row { display: flex; gap: 8px; overflow-x: auto; padding: 10px 0; }
        .day { min-width: 45px; height: 45px; border-radius: 12px; background: var(--grey); display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; border: 1px solid #333; }
        .day.green { background: var(--p); color: #000; font-weight: bold; border: none; }
        .day.red { background: var(--red); color: #fff; font-weight: bold; border: none; }
        .day.yellow { background: var(--yellow); color: #000; font-weight: bold; border: none; }

        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; display: none; align-items: center; justify-content: center; flex-direction: column; padding: 25px; }

        .btn { padding: 18px; border: none; border-radius: 15px; font-weight: bold; width: 100%; font-size: 16px; margin-bottom: 10px; }
        .btn-p { background: var(--p); color: #000; }
        .btn-y { background: var(--yellow); color: #000; }
        .btn-r { background: var(--red); color: #fff; }
        .btn-g { background: #444; color: #fff; }
        input { width: 100%; padding: 16px; background: #1a1a1a; border: 1px solid #333; color: #fff; border-radius: 14px; margin-bottom: 10px; font-size: 16px; }
    </style>
</head>
<body>

    <div id="scr-scan" class="screen active">
        <div class="video-box">
            <button id="cam-btn">ЗАПУСТИТЬ КАМЕРУ</button>
            <video id="video" autoplay playsinline muted></video>
        </div>
        <div class="scroll">
            <h3 id="st-text" style="text-align:center; color:var(--p)">ОЖИДАНИЕ...</h3>
        </div>
    </div>

    <div id="scr-base" class="screen">
        <div class="header" style="padding:20px; border-bottom:1px solid #222; display:flex; justify-content:space-between; align-items:center">
            <h2>ЖУРНАЛ</h2>
            <button onclick="app.download()" style="background:none; border:none; color:var(--p); font-weight:bold">ОТЧЕТ .TXT</button>
        </div>
        <div class="scroll">
            <div class="m-ctrl">
                <button class="m-btn" onclick="app.changeMonth(-1)">←</button>
                <b id="cur-m-name">---</b>
                <button class="m-btn" onclick="app.changeMonth(1)">→</button>
            </div>
            <div id="base-list"></div>
        </div>
    </div>

    <div id="scr-staff" class="screen">
        <div class="header" style="padding:20px; border-bottom:1px solid #222"><h2>ШТАТ</h2></div>
        <div class="scroll">
            <div class="card">
                <input type="text" id="reg-n" placeholder="Имя Фамилия">
                <input type="number" id="reg-rate" placeholder="Ставка в час">
                <input type="file" id="reg-f" accept="image/*" capture="user">
                <button class="btn btn-p" onclick="app.reg()">ДОБАВИТЬ В БАЗУ</button>
            </div>
            <div id="staff-list"></div>
        </div>
    </div>

    <div id="overlay">
        <h1 id="u-name" style="font-size: 28px; margin-bottom: 5px; text-align: center;">---</h1>
        <p id="u-date" style="color: #666; margin-bottom: 25px;"></p>
        <button class="btn btn-y" onclick="app.log('IN')">ВХОД (ЖЕЛТЫЙ)</button>
        <button class="btn btn-p" onclick="app.log('OUT')">ВЫХОД (ЗЕЛЕНЫЙ)</button>
        <button class="btn btn-r" id="opt-abs" onclick="app.log('ABSENT')">ПРОГУЛ (КРАСНЫЙ)</button>
        <button class="btn btn-g" id="opt-res" onclick="app.log('RESET')">ОЧИСТИТЬ</button>
        <button class="btn" style="background:none; color:#666; margin-top:10px" onclick="app.closeOverlay()">ОТМЕНА</button>
    </div>

    <div class="nav">
        <div class="nav-item active" onclick="app.ui('scr-scan', this)"><b>📷</b>СКАНЕР</div>
        <div class="nav-item" onclick="app.ui('scr-base', this)"><b>📅</b>БАЗА</div>
        <div class="nav-item" onclick="app.ui('scr-staff', this)"><b>👥</b>ШТАТ</div>
    </div>

<script>
let db, viewDate = new Date(), curU = null, modelsReady = false;

const app = {
    async init() {
        const req = indexedDB.open("BioID_Corp_v99", 1);
        req.onupgradeneeded = e => {
            const d = e.target.result;
            d.createObjectStore("workers", {keyPath: "name"});
            d.createObjectStore("logs", {keyPath: "id", autoIncrement: true});
        };
        req.onsuccess = e => { db = e.target.result; this.loadModels(); };
        document.getElementById('cam-btn').onclick = () => this.startCamera();
    },

    async loadModels() {
        const p = 'https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/models';
        try {
            await faceapi.nets.tinyFaceDetector.loadFromUri(p);
            await faceapi.nets.faceLandmark68Net.loadFromUri(p);
            await faceapi.nets.faceRecognitionNet.loadFromUri(p);
            modelsReady = true;
            document.getElementById('st-text').innerText = "ГОТОВО";
        } catch(e) { document.getElementById('st-text').innerText = "ОШИБКА МОДЕЛЕЙ"; }
    },

    async startCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
            document.getElementById('video').srcObject = stream;
            document.getElementById('cam-btn').style.display = 'none';
            this.runScanner();
        } catch(err) { alert("Камера недоступна"); }
    },

    runScanner() {
        setInterval(async () => {
            if(curU || !modelsReady || !document.getElementById('scr-scan').classList.contains('active')) return;
            const det = await faceapi.detectSingleFace(document.getElementById('video'), new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptor();
            if(det) {
                const ws = await this.get("workers");
                for(let w of ws) {
                    if(faceapi.euclideanDistance(det.descriptor, new Float32Array(w.desc)) < 0.45) {
                        this.openEdit(w.name, new Date().toISOString().split('T')[0], true);
                        break;
                    }
                }
            }
        }, 1000);
    },

    async openEdit(name, date, isScan = false) {
        const ws = await this.get("workers");
        const worker = ws.find(w => w.name === name);
        if(!worker) return;
        curU = { ...worker, targetDate: date };
        document.getElementById('u-name').innerText = worker.name;
        document.getElementById('u-date').innerText = date;
        document.getElementById('opt-abs').style.display = isScan ? 'none' : 'block';
        document.getElementById('opt-res').style.display = isScan ? 'none' : 'block';
        document.getElementById('overlay').style.display = 'flex';
    },

    async log(type) {
        const tx = db.transaction("logs", "readwrite");
        const store = tx.objectStore("logs");
        const all = await this.get("logs");
        all.filter(l => l.name === curU.name && l.date === curU.targetDate).forEach(l => store.delete(l.id));

        if(type === 'IN') {
            store.add({ name: curU.name, date: curU.targetDate, type: 'IN', ts: Date.now() });
        } else if(type === 'OUT') {
            // Если нажимаем ВЫХОД, автоматически ставим ВХОД 8ч назад для расчета денег
            store.add({ name: curU.name, date: curU.targetDate, type: 'IN', ts: Date.now() - 28800000 });
            store.add({ name: curU.name, date: curU.targetDate, type: 'OUT', ts: Date.now() });
        } else if(type === 'ABSENT') {
            store.add({ name: curU.name, date: curU.targetDate, type: 'ABSENT' });
        }

        tx.oncomplete = () => { this.closeOverlay(); this.renderB(); };
    },

    closeOverlay() { curU = null; document.getElementById('overlay').style.display = 'none'; },

    async reg() {
        const n = document.getElementById('reg-n').value, r = document.getElementById('reg-rate').value, f = document.getElementById('reg-f').files[0];
        if(!n || !f || !r) return alert("Заполни всё!");
        const img = await faceapi.bufferToImage(f);
        const det = await faceapi.detectSingleFace(img, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptor();
        if(det) {
            db.transaction("workers", "readwrite").objectStore("workers").put({
                name: n, rate: parseFloat(r), desc: Array.from(det.descriptor)
            });
            alert("Добавлен!"); this.renderS();
        } else alert("Лицо не найдено!");
    },

    async renderB() {
        const mNames = ["ЯНВАРЬ","ФЕВРАЛЬ","МАРТ","АПРЕЛЬ","МАЙ","ИЮНЬ","ИЮЛЬ","АВГУСТ","СЕНТЯБРЬ","ОКТЯБРЬ","НОЯБРЬ","ДЕКАБРЬ"];
        document.getElementById('cur-m-name').innerText = `${mNames[viewDate.getMonth()]} ${viewDate.getFullYear()}`;
        const ws = await this.get("workers"), ls = await this.get("logs");
        const dim = new Date(viewDate.getFullYear(), viewDate.getMonth() + 1, 0).getDate();

        document.getElementById('base-list').innerHTML = ws.map(w => {
            let dH = '', totalH = 0;
            for(let i=1; i<=dim; i++) {
                const ds = `${viewDate.getFullYear()}-${String(viewDate.getMonth()+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
                const dl = ls.filter(l => l.name === w.name && l.date === ds);
                const cin = dl.find(l => l.type === 'IN'), cout = dl.find(l => l.type === 'OUT'), abs = dl.find(l => l.type === 'ABSENT');
                if(cin && cout) totalH += (cout.ts - cin.ts) / 3600000;
                let st = abs ? 'red' : (cout ? 'green' : (cin ? 'yellow' : ''));
                dH += `<div class="day ${st}" onclick="app.openEdit('${w.name}','${ds}')">${i}</div>`;
            }
            return `<div class="card"><b>${w.name}</b> <span style="float:right; color:var(--p)">${(totalH * w.rate).toFixed(0)} ₽</span><div class="cal-row">${dH}</div></div>`;
        }).join('');
    },

    async renderS() {
        const ws = await this.get("workers");
        document.getElementById('staff-list').innerHTML = ws.map(w => `<div class="card" style="display:flex; justify-content:space-between"><div><b>${w.name}</b><br>${w.rate}₽/час</div><button onclick="app.delS('${w.name}')" style="color:var(--red); background:none; border:none">УДАЛИТЬ</button></div>`).join('');
    },

    async delS(n) { if(confirm("Удалить?")) { db.transaction("workers","readwrite").objectStore("workers").delete(n); this.renderS(); } },
    changeMonth(dir) { viewDate.setMonth(viewDate.getMonth() + dir); this.renderB(); },
    get(n) { return new Promise(r => db.transaction(n).objectStore(n).getAll().onsuccess = e => r(e.target.result)); },
    ui(id, el) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
        if(id === 'scr-base') this.renderB();
        if(id === 'scr-staff') this.renderS();
    },
    async download() {
        const ws = await this.get("workers"), ls = await this.get("logs");
        let t = `ОТЧЕТ ЗА ${viewDate.getMonth()+1}/${viewDate.getFullYear()}\n\n`;
        ws.forEach(w => {
            let h = 0;
            const wl = ls.filter(l => l.name === w.name && new Date(l.date).getMonth() === viewDate.getMonth());
            const days = [...new Set(wl.map(l => l.date))];
            days.forEach(d => {
                const dayL = wl.filter(l => l.date === d);
                const cin = dayL.find(l => l.type === 'IN'), cout = dayL.find(l => l.type === 'OUT');
                if(cin && cout) h += (cout.ts - cin.ts) / 3600000;
            });
            t += `${w.name}: ${h.toFixed(1)}ч | Итого: ${(h * w.rate).toFixed(0)} ₽\n`;
        });
        const a = document.createElement("a"); a.href = URL.createObjectURL(new Blob([t])); a.download = "report.txt"; a.click();
    }
};
window.onload = () => app.init();
</script>
</body>
</html>
