<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <title>BioID Original Style</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #000; color: #fff; height: 100vh; overflow: hidden; }
        
        .screen { display: none; width: 100%; height: 100%; position: fixed; flex-direction: column; align-items: center; justify-content: center; background: #000; }
        .screen.active { display: flex; }

        /* Стиль кнопок как в начале */
        .btn { padding: 20px; border: none; border-radius: 15px; font-weight: bold; width: 85%; max-width: 320px; margin: 12px 0; font-size: 16px; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; transition: 0.3s; }
        .btn-primary { background: #2ecc71; color: #000; }
        .btn-dark { background: #111; color: #fff; border: 1px solid #333; }
        .btn:disabled { opacity: 0.1; cursor: not-allowed; }

        /* Камера */
        .video-box { position: relative; width: 90%; max-width: 400px; aspect-ratio: 3/4; border: 3px solid #2ecc71; border-radius: 25px; overflow: hidden; margin-bottom: 20px; }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; border: 40px solid rgba(0,0,0,0.3); box-sizing: border-box; }
        
        /* Уведомление о входе */
        #access-msg { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); background: #2ecc71; color: #000; padding: 10px 20px; border-radius: 10px; font-weight: bold; display: none; z-index: 10; white-space: nowrap; }

        /* Админка */
        .admin-panel { width: 100%; height: 100%; padding: 20px; overflow-y: auto; display: block; }
        .form-group { background: #111; padding: 20px; border-radius: 20px; margin-bottom: 20px; }
        input[type="text"] { width: 100%; padding: 15px; background: #000; border: 1px solid #333; color: #fff; border-radius: 10px; margin-bottom: 15px; }
        
        .user-list { width: 100%; }
        .user-item { display: flex; align-items: center; background: #0a0a0a; padding: 12px; border-radius: 12px; margin-bottom: 8px; border-left: 4px solid #2ecc71; }
        .user-item img { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; margin-right: 15px; }
    </style>
</head>
<body>

    <!-- ЭКРАН 1: ГЛАВНЫЙ (ЛОНЧЕР) -->
    <div id="launcher" class="screen active">
        <h1 style="letter-spacing: 5px; margin-bottom: 10px;">BIOID</h1>
        <p id="loader-info" style="color: #2ecc71; margin-bottom: 40px; font-size: 14px;">ЗАГРУЗКА БАЗЫ...</p>
        
        <button id="btn-scan" class="btn btn-primary" onclick="ui.show('terminal')" disabled>ВХОД</button>
        <button id="btn-admin" class="btn btn-dark" onclick="ui.show('admin')" disabled>БАЗА</button>
    </div>

    <!-- ЭКРАН 2: ТЕРМИНАЛ (КАМЕРА) -->
    <div id="terminal" class="screen">
        <div style="position: absolute; top: 20px; left: 20px; font-size: 20px;" onclick="ui.show('launcher')">✕</div>
        
        <div class="video-box">
            <video id="video" autoplay playsinline muted></video>
            <div class="overlay"></div>
            <div id="access-msg">ДОСТУП РАЗРЕШЕН</div>
        </div>
        
        <div id="scan-status" style="color: #2ecc71; font-family: monospace;">СКАНЕР: ПОИСК ЛИЦА...</div>
    </div>

    <!-- ЭКРАН 3: АДМИНКА -->
    <div id="admin" class="screen" style="justify-content: flex-start; align-items: stretch;">
        <div style="padding: 20px; border-bottom: 1px solid #222;" onclick="ui.show('launcher')">← НАЗАД</div>
        
        <div class="admin-panel">
            <div class="form-group">
                <input type="text" id="reg-name" placeholder="ИМЯ СОТРУДНИКА">
                <input type="file" id="reg-file" accept="image/*" style="font-size: 12px; color: #666; margin-bottom: 15px;">
                <button id="reg-btn" class="btn btn-primary" style="width: 100%; margin: 0;" onclick="engine.register()">СОХРАНИТЬ В БАЗУ</button>
            </div>

            <div id="list-container" class="user-list">
                <!-- Сюда добавятся люди -->
            </div>
        </div>
    </div>

<script>
// 1. БАЗА ДАННЫХ (Улучшенная версия для GitHub)
const db = {
    async init() {
        return new Promise(res => {
            const req = indexedDB.open('BioID_Final_DB', 1);
            req.onupgradeneeded = e => {
                const d = e.target.result;
                if(!d.objectStoreNames.contains('users')) d.createObjectStore('users', {keyPath: 'name'});
            };
            req.onsuccess = e => { this.instance = e.target.result; res(); };
        });
    },
    async save(user) {
        const tx = this.instance.transaction('users', 'readwrite');
        await tx.objectStore('users').put(user);
    },
    async getAll() {
        return new Promise(res => {
            this.instance.transaction('users').objectStore('users').getAll().onsuccess = e => res(e.target.result || []);
        });
    }
};

// 2. ДВИЖОК ИИ
const engine = {
    async init() {
        try {
            const URL = './models'; // Папка с моделями в корне GitHub
            await Promise.all([
                faceapi.nets.tinyFaceDetector.loadFromUri(URL),
                faceapi.nets.faceLandmark68Net.loadFromUri(URL),
                faceapi.nets.faceRecognitionNet.loadFromUri(URL)
            ]);
            document.getElementById('loader-info').textContent = "СИСТЕМА ГОТОВА";
            document.getElementById('btn-scan').disabled = false;
            document.getElementById('btn-admin').disabled = false;
        } catch (e) {
            document.getElementById('loader-info').textContent = "ОШИБКА ФАЙЛОВ";
            document.getElementById('loader-info').style.color = "red";
        }
    },

    async register() {
        const name = document.getElementById('reg-name').value;
        const file = document.getElementById('reg-file').files[0];
        if(!name || !file) return alert("Заполните данные!");

        const btn = document.getElementById('reg-btn');
        btn.disabled = true; btn.textContent = "АНАЛИЗ...";

        const img = await faceapi.bufferToImage(file);
        const res = await faceapi.detectSingleFace(img, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptor();

        if(res) {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = async () => {
                await db.save({ name, descriptor: Array.from(res.descriptor), photo: reader.result });
                alert("СОХРАНЕНО!");
                document.getElementById('reg-name').value = "";
                ui.renderList();
                btn.disabled = false; btn.textContent = "СОХРАНИТЬ В БАЗУ";
            };
        } else {
            alert("ЛИЦО НЕ НАЙДЕНО!");
            btn.disabled = false; btn.textContent = "СОХРАНИТЬ В БАЗУ";
        }
    },

    async scan() {
        if(ui.current !== 'terminal') return;
        const video = document.getElementById('video');
        const users = await db.getAll();

        if(users.length && video.readyState === 4) {
            const res = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptor();
            if(res) {
                for(let u of users) {
                    const dist = faceapi.euclideanDistance(res.descriptor, new Float32Array(u.descriptor));
                    if(dist < 0.55) {
                        ui.showAccess(u.name);
                        return; // Останавливаем цикл, если нашли
                    }
                }
            }
        }
        setTimeout(() => this.scan(), 400);
    }
};

// 3. ИНТЕРФЕЙС
const ui = {
    current: 'launcher',
    show(id) {
        this.current = id;
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        
        if(id === 'terminal') {
            navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } })
                .then(stream => {
                    document.getElementById('video').srcObject = stream;
                    engine.scan();
                });
        } else if(id === 'admin') {
            this.renderList();
        }
    },
    async renderList() {
        const users = await db.getAll();
        document.getElementById('list-container').innerHTML = users.map(u => `
            <div class="user-item">
                <img src="${u.photo}">
                <div>
                    <div style="font-weight:bold; font-size:14px;">${u.name}</div>
                    <div style="font-size:10px; color:#2ecc71;">БИОМЕТРИЯ АКТИВНА</div>
                </div>
            </div>
        `).join('');
    },
    showAccess(name) {
        const msg = document.getElementById('access-msg');
        const status = document.getElementById('scan-status');
        msg.textContent = "ВХОД: " + name;
        msg.style.display = "block";
        status.textContent = "ЛИЦО РАСПОЗНАНО";
        
        setTimeout(() => {
            msg.style.display = "none";
            status.textContent = "СКАНЕР: ПОИСК ЛИЦА...";
            engine.scan(); // Снова запускаем поиск через 3 секунды
        }, 3000);
    }
};

window.onload = () => { db.init(); engine.init(); };
</script>
</body>
</html>
