<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <title>BioID Fix</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: #000; color: #fff; height: 100vh; overflow: hidden; }
        .screen { display: none; width: 100%; height: 100%; position: fixed; flex-direction: column; background: #000; }
        .screen.active { display: flex; }
        .btn { padding: 18px; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; width: 85%; max-width: 300px; margin: 10px auto; display: block; }
        .btn-primary { background: #2ecc71; color: #000; }
        .btn:disabled { opacity: 0.2; }
        .v-container { width: 85%; max-width: 350px; aspect-ratio: 3/4; border: 2px solid #2ecc71; border-radius: 20px; overflow: hidden; margin: auto; }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        .worker-card { display: flex; align-items: center; background: #111; padding: 10px; border-radius: 10px; margin-bottom: 10px; }
        .worker-card img { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; margin-right: 15px; }
    </style>
</head>
<body>

    <div id="launcher" class="screen active">
        <div style="margin: auto; text-align: center; width: 100%;">
            <h1>BIOID <span style="color:#2ecc71">ELITE</span></h1>
            <p id="msg" style="color: #444; margin: 20px 0;">ЗАГРУЗКА...</p>
            <button id="b1" class="btn btn-primary" onclick="ui.show('terminal')" disabled>СКАНЕР</button>
            <button id="b2" class="btn" style="background:#1a1a1a; color:#fff" onclick="ui.show('admin')" disabled>АДМИНКА</button>
        </div>
    </div>

    <div id="terminal" class="screen">
        <div style="padding: 20px;" onclick="ui.show('launcher')">✕ НАЗАД</div>
        <div class="v-container"><video id="video" autoplay playsinline muted></video></div>
        <div id="st" style="text-align:center; color:#2ecc71; padding:20px;">ПОИСК...</div>
    </div>

    <div id="admin" class="screen" style="overflow-y: auto; padding: 20px;">
        <div onclick="ui.show('launcher')" style="margin-bottom: 20px;">✕ НАЗАД</div>
        <div style="background:#111; padding:15px; border-radius:15px; margin-bottom:20px;">
            <input type="text" id="n" placeholder="ИМЯ" style="width:100%; padding:12px; margin-bottom:10px;">
            <input type="file" id="f" accept="image/*" style="margin-bottom:10px; font-size:12px;">
            <button id="rb" class="btn btn-primary" style="width:100%; margin:0" onclick="engine.reg()">ДОБАВИТЬ</button>
        </div>
        <div id="list"></div>
    </div>

<script>
// Принудительно удаляем старые Service Workers
navigator.serviceWorker.getRegistrations().then(rs => rs.forEach(r => r.unregister()));

const db = {
    async init() {
        return new Promise(res => {
            const req = indexedDB.open('BioID_vFinal', 3);
            req.onupgradeneeded = e => e.target.result.createObjectStore('users', {keyPath:'name'});
            req.onsuccess = e => { this.i = e.target.result; res(); };
        });
    },
    async add(u) { const t = this.i.transaction('users','readwrite'); await t.objectStore('users').put(u); },
    async get() { return new Promise(res => { this.i.transaction('users').objectStore('users').getAll().onsuccess = e => res(e.target.result || []); }); }
};

const engine = {
    async init() {
        try {
            const url = './models';
            await Promise.all([
                faceapi.nets.tinyFaceDetector.loadFromUri(url),
                faceapi.nets.faceLandmark68Net.loadFromUri(url),
                faceapi.nets.faceRecognitionNet.loadFromUri(url)
            ]);
            document.getElementById('msg').textContent = "ГОТОВО";
            document.getElementById('b1').disabled = document.getElementById('b2').disabled = false;
        } catch(e) { document.getElementById('msg').textContent = "ОШИБКА"; }
    },
    async reg() {
        const name = document.getElementById('n').value, file = document.getElementById('f').files[0];
        if(!name || !file) return;
        const btn = document.getElementById('rb'); btn.disabled = true;
        
        const img = await faceapi.bufferToImage(file);
        const res = await faceapi.detectSingleFace(img, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptor();
        
        if(res) {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = async () => {
                await db.add({name, desc: Array.from(res.descriptor), pic: reader.result});
                alert("ДОБАВЛЕН");
                document.getElementById('n').value = "";
                ui.render();
                btn.disabled = false;
            };
        } else { alert("НЕТ ЛИЦА"); btn.disabled = false; }
    },
    async scan() {
        if(ui.cur !== 'terminal') return;
        const v = document.getElementById('video'), users = await db.get();
        if(users.length && v.readyState === 4) {
            const res = await faceapi.detectSingleFace(v, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptor();
            if(res) {
                for(let u of users) {
                    const d = faceapi.euclideanDistance(res.desc, new Float32Array(u.desc));
                    if(d < 0.55) { alert("ПРИВЕТ, " + u.name); break; }
                }
            }
        }
        setTimeout(() => this.scan(), 600);
    }
};

const ui = {
    cur: 'launcher',
    show(id) {
        this.cur = id;
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'terminal') {
            navigator.mediaDevices.getUserMedia({video:{facingMode:'user'}}).then(s => {document.getElementById('video').srcObject = s; engine.scan();});
        } else if(id === 'admin') this.render();
    },
    async render() {
        const users = await db.get();
        document.getElementById('list').innerHTML = users.map(u => `
            <div class="worker-card">
                <img src="${u.pic}">
                <b>${u.name}</b>
            </div>
        `).join('');
    }
};

window.onload = () => { db.init(); engine.init(); };
</script>
</body>
</html>
