<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BioID Pro v7.5</title>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        :root { --p: #00ff88; --bg: #000; --card: #111; --red: #ff4d4d; --yellow: #f1c40f; --grey: #222; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; font-family: -apple-system, sans-serif; height: 100vh; overflow: hidden; }

        /* Navigation */
        .screen { display: none; width: 100%; height: 100%; position: fixed; flex-direction: column; padding-bottom: 80px; }
        .screen.active { display: flex; }
        
        .nav { position: fixed; bottom: 0; width: 100%; height: 75px; background: #0a0a0a; display: flex; border-top: 1px solid #222; z-index: 1000; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; color: #555; }
        .nav-item.active { color: var(--p); }
        .nav-item i { font-style: normal; font-size: 24px; margin-bottom: 2px; }

        /* Header */
        .header { padding: 20px; background: var(--card); border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; }
        .header h2 { font-size: 18px; color: var(--p); text-transform: uppercase; }

        /* Content */
        .scroll { flex: 1; overflow-y: auto; padding: 15px; }
        .card { background: var(--card); border-radius: 18px; padding: 15px; margin-bottom: 12px; border: 1px solid #222; }

        /* Calendar Grid */
        .cal-row { display: flex; gap: 8px; overflow-x: auto; padding: 10px 0; scrollbar-width: none; }
        .cal-row::-webkit-scrollbar { display: none; }
        .day { 
            min-width: 42px; height: 42px; border-radius: 10px; background: var(--grey); 
            display: flex; align-items: center; justify-content: center; font-size: 13px; flex-shrink: 0; 
        }
        .day.green { background: var(--p); color: #000; font-weight: bold; }
        .day.red { background: var(--red); color: #fff; }
        .day.yellow { background: var(--yellow); color: #000; }

        /* Camera */
        #video { width: 100%; height: 50vh; object-fit: cover; background: #000; border-bottom: 2px solid var(--p); }
        #overlay { 
            position: absolute; bottom: 100px; left: 15px; right: 15px; 
            background: rgba(0,0,0,0.95); padding: 25px; border-radius: 25px; 
            border: 1px solid var(--p); display: none; text-align: center; z-index: 2000;
        }

        /* Buttons & Forms */
        .btn { padding: 15px; border: none; border-radius: 12px; font-weight: bold; font-size: 14px; width: 100%; margin-top: 10px; }
        .btn-p { background: var(--p); color: #000; }
        .btn-sec { background: #222; color: #fff; }
        input { width: 100%; padding: 16px; background: #1a1a1a; border: 1px solid #333; color: #fff; border-radius: 12px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <!-- SCANNER -->
    <div id="scr-scan" class="screen active">
        <video id="video" autoplay playsinline muted></video>
        <div class="scroll" style="text-align:center">
            <h2 id="st-text" style="color:var(--p)">ИНИЦИАЛИЗАЦИЯ...</h2>
            <p style="color:#444; margin-top:10px">Направьте камеру на лицо</p>
        </div>
        <div id="overlay">
            <h1 id="u-name" style="margin-bottom:20px">---</h1>
            <div style="display:flex; gap:10px">
                <button class="btn btn-p" onclick="app.log('IN')">ВХОД</button>
                <button class="btn btn-sec" style="background:var(--red)" onclick="app.log('OUT')">ВЫХОД</button>
            </div>
            <button class="btn btn-sec" onclick="app.closeOverlay()">ОТМЕНА</button>
        </div>
    </div>

    <!-- ATTENDANCE -->
    <div id="scr-base" class="screen">
        <div class="header">
            <h2>КАЛЕНДАРЬ</h2>
            <button onclick="app.download()" style="background:none; border:none; color:var(--p); font-size:12px">ОТЧЕТ .TXT</button>
        </div>
        <div class="scroll">
            <div id="month-nav" style="display:flex; gap:8px; overflow-x:auto; margin-bottom:15px"></div>
            <div id="base-list"></div>
        </div>
    </div>

    <!-- STAFF -->
    <div id="scr-staff" class="screen">
        <div class="header"><h2>СОТРУДНИКИ</h2></div>
        <div class="scroll">
            <div class="card">
                <input type="text" id="reg-n" placeholder="Имя Фамилия">
                <input type="file" id="reg-f" accept="image/*" capture="user">
                <button class="btn btn-p" onclick="app.reg()">ДОБАВИТЬ В БАЗУ</button>
            </div>
            <div id="staff-list"></div>
        </div>
    </div>

    <!-- NAV -->
    <div class="nav">
        <div class="nav-item active" onclick="app.ui('scr-scan', this)"><i>📷</i>СКАНЕР</div>
        <div class="nav-item" onclick="app.ui('scr-base', this)"><i>📅</i>БАЗА</div>
        <div class="nav-item" onclick="app.ui('scr-staff', this)"><i>👥</i>ШТАТ</div>
    </div>

<script>
let db;
let curM = new Date().getMonth();
let curU = null;
const mons = ["Янв","Фев","Мар","Апр","Май","Июн","Июл","Авг","Сен","Окт","Ноя","Дек"];

const app = {
    async init() {
        const req = indexedDB.open("BioID_Final_v75", 1);
        req.onupgradeneeded = e => {
            const d = e.target.result;
            d.createObjectStore("workers", {keyPath: "name"});
            d.createObjectStore("logs", {keyPath: "id", autoIncrement: true});
        };
        req.onsuccess = e => { db = e.target.result; this.load(); };
    },

    async load() {
        const p = './models';
        try {
            await faceapi.nets.tinyFaceDetector.loadFromUri(p);
            await faceapi.nets.faceLandmark68Net.loadFromUri(p);
            await faceapi.nets.faceRecognitionNet.loadFromUri(p);
            document.getElementById('st-text').innerText = "СКАНЕР ГОТОВ";
            this.start();
        } catch(e) { document.getElementById('st-text').innerText = "ОШИБКА МОДЕЛЕЙ"; }
    },

    ui(id, el) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(el) el.classList.add('active');
        if(id === 'scr-base') this.renderB();
        if(id === 'scr-staff') this.renderS();
    },

    async start() {
        const v = document.getElementById('video');
        const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
        v.srcObject = s;
        setInterval(async () => {
            if(curU || !document.getElementById('scr-scan').classList.contains('active')) return;
            const ws = await this.get("workers");
            const det = await faceapi.detectSingleFace(v, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptor();
            if(det && ws.length) {
                for(let w of ws) {
                    if(faceapi.euclideanDistance(det.descriptor, new Float32Array(w.desc)) < 0.5) {
                        curU = w;
                        document.getElementById('u-name').innerText = w.name;
                        document.getElementById('overlay').style.display = 'block';
                        break;
                    }
                }
            }
        }, 1000);
    },

    async log(t) {
        const d = new Date().toISOString().split('T')[0];
        const tx = db.transaction("logs", "readwrite");
        tx.objectStore("logs").add({ name: curU.name, date: d, type: t, time: new Date().toLocaleTimeString() });
        this.closeOverlay();
        alert("Записано!");
    },

    closeOverlay() { curU = null; document.getElementById('overlay').style.display = 'none'; },

    async reg() {
        const n = document.getElementById('reg-n').value, f = document.getElementById('reg-f').files[0];
        if(!n || !f) return alert("Введите имя и фото");
        const img = await faceapi.bufferToImage(f);
        const det = await faceapi.detectSingleFace(img, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptor();
        if(det) {
            const rd = new FileReader(); rd.readAsDataURL(f);
            rd.onload = () => {
                db.transaction("workers", "readwrite").objectStore("workers").put({name: n, desc: Array.from(det.descriptor), pic: rd.rd});
                alert("Добавлен!"); this.renderS();
            };
        } else alert("Лицо не найдено");
    },

    async renderS() {
        const ws = await this.get("workers");
        document.getElementById('staff-list').innerHTML = ws.map(w => `
            <div class="card" style="display:flex; justify-content:space-between; align-items:center">
                <b>${w.name}</b>
                <button class="btn btn-sec" style="width:auto; margin:0; padding:5px 15px" onclick="app.delS('${w.name}')">УДАЛИТЬ</button>
            </div>
        `).join('');
    },

    async delS(n) { if(confirm("Удалить?")) { db.transaction("workers","readwrite").objectStore("workers").delete(n); this.renderS(); } },

    async renderB() {
        document.getElementById('month-nav').innerHTML = mons.map((m, i) => `
            <div onclick="app.curM=${i};app.renderB()" style="padding:10px 20px; background:${i===curM? 'var(--p)':'#1a1a1a'}; color:${i===curM?'#000':'#666'}; border-radius:12px; font-size:12px; font-weight:bold">${m}</div>
        `).join('');

        const ws = await this.get("workers");
        const ls = await this.get("logs");
        const list = document.getElementById('base-list');
        const dim = new Date(2026, curM + 1, 0).getDate();

        list.innerHTML = ws.map(w => {
            let dH = '';
            for(let i=1; i<=dim; i++) {
                const ds = `2026-${String(curM+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
                const dl = ls.filter(l => l.name === w.name && l.date === ds);
                let st = dl.length ? (dl.some(l => l.type==='OUT') ? 'green' : 'yellow') : '';
                if(dl.some(l => l.type==='ABSENT')) st = 'red';
                dH += `<div class="day ${st}" onclick="app.edit('${w.name}','${ds}')">${i}</div>`;
            }
            return `<div class="card"><b>${w.name}</b><div class="cal-row">${dH}</div></div>`;
        }).join('');
    },

    async edit(n, d) {
        const s = prompt("1: Был (Зел), 2: Прогул (Кр), 3: ОЧИСТИТЬ (Серый)");
        const tx = db.transaction("logs", "readwrite");
        const st = tx.objectStore("logs");
        
        // Сначала удаляем все записи за этот день, чтобы «очистить» до серого
        const all = await this.get("logs");
        all.forEach(l => {
            if(l.name === n && l.date === d) db.transaction("logs","readwrite").objectStore("logs").delete(l.id);
        });

        // Если выбрано 1 или 2 — добавляем новую запись
        setTimeout(() => {
            const tx2 = db.transaction("logs", "readwrite");
            if(s === '1') tx2.objectStore("logs").add({name: n, date: d, type: 'OUT'});
            if(s === '2') tx2.objectStore("logs").add({name: n, date: d, type: 'ABSENT'});
            setTimeout(() => this.renderB(), 100);
        }, 100);
    },

    async download() {
        const ws = await this.get("workers");
        const ls = await this.get("logs");
        let t = `ОТЧЕТ: ${mons[curM]} 2026\n\n`;
        ws.forEach(w => {
            const wl = ls.filter(l => l.name === w.name && new Date(l.date).getMonth() === curM);
            t += `${w.name}: ${[...new Set(wl.map(l=>l.date))].length} дн.\n`;
        });
        const b = new Blob([t], {type:"text/plain"});
        const a = document.createElement("a"); a.href = URL.createObjectURL(b); a.download = "report.txt"; a.click();
    },

    get(n) { return new Promise(r => db.transaction(n).objectStore(n).getAll().onsuccess = e => r(e.target.result)); }
};

window.onload = () => app.init();
</script>
</body>
</html>
