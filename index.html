<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BioID Enterprise v5.0</title>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        :root { --primary: #2ecc71; --accent: #3498db; --danger: #e74c3c; --dark-card: #111; --text-muted: #888; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background: #000; color: #fff; height: 100vh; overflow: hidden; }
        
        .screen { display: none; width: 100%; height: 100%; position: fixed; flex-direction: column; }
        .screen.active { display: flex; }

        /* Навигация */
        .nav { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; background: #000; z-index: 100; }
        .nav-btn { padding: 8px 15px; background: #222; border-radius: 8px; font-size: 12px; font-weight: bold; }

        /* Дашборд Аналитики */
        .analytics-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; }
        .stat-card { background: var(--dark-card); padding: 15px; border-radius: 15px; border-left: 4px solid var(--primary); }
        .stat-card h4 { font-size: 10px; color: var(--text-muted); text-transform: uppercase; }
        .stat-card p { font-size: 20px; font-weight: bold; margin-top: 5px; }

        /* Список сотрудников */
        .admin-scroll { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 120px; }
        .employee-card { background: var(--dark-card); border-radius: 20px; padding: 15px; margin-bottom: 15px; border: 1px solid #222; }
        .emp-info { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; }
        .emp-info img { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; border: 2px solid var(--primary); }
        
        /* Компактный календарь */
        .cal-strip { display: flex; overflow-x: auto; gap: 6px; padding: 5px 0; scrollbar-width: none; }
        .cal-strip::-webkit-scrollbar { display: none; }
        .day-node { min-width: 35px; height: 35px; background: #222; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 12px; flex-shrink: 0; }
        .day-node.present { background: var(--primary); color: #000; font-weight: bold; }

        /* Камера и Терминал */
        #video { width: 100%; height: 60vh; object-fit: cover; transform: scaleX(-1); border-bottom: 3px solid var(--primary); }
        .scan-overlay { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #000; }
        #scan-name { font-size: 24px; font-weight: bold; color: var(--primary); margin-bottom: 10px; }

        /* Формы и кнопки */
        .fab { position: fixed; bottom: 30px; right: 20px; background: var(--primary); width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; box-shadow: 0 10px 20px rgba(46,204,113,0.3); z-index: 200; color: #000; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
        .modal.active { display: flex; }
        .modal-body { background: #111; width: 100%; padding: 25px; border-radius: 25px; border: 1px solid #333; }
        input { width: 100%; padding: 15px; background: #000; border: 1px solid #333; color: #fff; border-radius: 12px; margin: 10px 0; font-size: 16px; }
        .save-btn { width: 100%; padding: 15px; background: var(--primary); color: #000; border: none; border-radius: 12px; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

    <!-- Launcher -->
    <div id="launcher" class="screen active" style="justify-content: center; align-items: center; text-align: center; padding: 30px;">
        <h1 style="font-size: 42px; margin-bottom: 10px;">BioID <span style="color:var(--primary)">ENT</span></h1>
        <p id="msg" style="color:var(--text-muted); margin-bottom: 40px;">ЗАГРУЗКА БИЗНЕС-МОДУЛЕЙ...</p>
        <button class="save-btn" id="b1" onclick="ent.openTerminal()" disabled style="max-width:300px">📷 ТЕРМИНАЛ ВХОДА</button>
        <button class="save-btn" id="b2" onclick="ent.openAdmin()" disabled style="max-width:300px; background:var(--accent); margin-top:15px">⚙️ ПАНЕЛЬ УПРАВЛЕНИЯ</button>
    </div>

    <!-- Terminal -->
    <div id="user-terminal" class="screen">
        <div class="nav">
            <span>ENT TERMINAL v5.0</span>
            <div class="nav-btn" onclick="location.reload()">ВЫХОД</div>
        </div>
        <video id="video" autoplay playsinline muted></video>
        <div class="scan-overlay">
            <div id="scan-name">СКАНИРОВАНИЕ...</div>
            <div id="scan-time" style="color:#444">ОЖИДАНИЕ ОБЪЕКТА</div>
        </div>
    </div>

    <!-- Admin Panel -->
    <div id="admin-dashboard" class="screen">
        <div class="nav">
            <h2 style="color:var(--primary)">DASHBOARD</h2>
            <div class="nav-btn" onclick="location.reload()">НАЗАД</div>
        </div>
        
        <!-- Аналитика -->
        <div class="analytics-grid" id="analytics-data">
            <div class="stat-card"><h4>Штат</h4><p id="total-staff">0</p></div>
            <div class="stat-card" style="border-color:var(--accent)"><h4>Явка %</h4><p id="attendance-rate">0%</p></div>
        </div>

        <div class="admin-scroll" id="emp-list">
            <!-- Список сотрудников -->
        </div>

        <div class="fab" onclick="ent.toggleModal(true)">+</div>
    </div>

    <!-- Modal -->
    <div id="modal" class="modal">
        <div class="modal-body">
            <h3 style="color:var(--primary)">НОВЫЙ КОНТРАКТ</h3>
            <input type="text" id="reg-name" placeholder="ФИО сотрудника">
            <input type="number" id="reg-salary" placeholder="Ставка за смену ($)">
            <input type="file" id="reg-file" accept="image/*" style="border:none; padding:10px 0">
            <button class="save-btn" onclick="ent.register()">ПОДПИСАТЬ</button>
            <button class="save-btn" style="background:#222; color:#fff" onclick="ent.toggleModal(false)">ОТМЕНА</button>
        </div>
    </div>

<script>
const dbName = "BioEnterpriseDB_v5";
let db;

const ent = {
    async init() {
        await this.initDB();
        try {
            await faceapi.nets.tinyFaceDetector.loadFromUri('./models');
            await faceapi.nets.faceLandmark68Net.loadFromUri('./models');
            await faceapi.nets.faceRecognitionNet.loadFromUri('./models');
            document.getElementById('msg').innerText = "КОРПОРАТИВНАЯ СЕТЬ АКТИВНА";
            document.getElementById('b1').disabled = document.getElementById('b2').disabled = false;
        } catch(e) { document.getElementById('msg').innerText = "ОШИБКА МОДЕЛЕЙ"; }
    },

    async initDB() {
        return new Promise(r => {
            const req = indexedDB.open(dbName, 1);
            req.onupgradeneeded = e => {
                const d = e.target.result;
                d.createObjectStore("workers", {keyPath: "name"});
                d.createObjectStore("logs", {keyPath: "id", autoIncrement: true});
            };
            req.onsuccess = e => { db = e.target.result; r(); };
        });
    },

    async openTerminal() {
        this.switch('user-terminal');
        const v = document.getElementById('video');
        const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
        v.srcObject = s;
        v.onloadedmetadata = () => { v.play(); this.detect(); };
    },

    async detect() {
        const v = document.getElementById('video');
        const workers = await this.getStore("workers");
        setInterval(async () => {
            const det = await faceapi.detectSingleFace(v, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptor();
            if(det && workers.length) {
                for(let w of workers) {
                    if(faceapi.euclideanDistance(det.descriptor, new Float32Array(w.desc)) < 0.5) {
                        document.getElementById('scan-name').innerText = w.name;
                        this.saveLog(w.name);
                        return;
                    }
                }
                document.getElementById('scan-name').innerText = "НЕИЗВЕСТНЫЙ";
            }
        }, 1000);
    },

    async saveLog(name) {
        const date = new Date().toISOString().split('T')[0];
        const logs = await this.getStore("logs");
        if(!logs.some(l => l.name === name && l.date === date)) {
            const tx = db.transaction("logs", "readwrite");
            tx.objectStore("logs").add({name, date, time: new Date().toLocaleTimeString()});
        }
    },

    async openAdmin() {
        this.switch('admin-dashboard');
        const workers = await this.getStore("workers");
        const logs = await this.getStore("logs");
        
        // Аналитика
        document.getElementById('total-staff').innerText = workers.length;
        const rate = workers.length ? Math.round((logs.filter(l => l.date === new Date().toISOString().split('T')[0]).length / workers.length) * 100) : 0;
        document.getElementById('attendance-rate').innerText = rate + "%";

        // Список
        const list = document.getElementById('emp-list');
        list.innerHTML = workers.map(w => {
            const wLogs = logs.filter(l => l.name === w.name);
            const salary = wLogs.length * (w.salary || 0);
            return `
                <div class="employee-card">
                    <div class="emp-info">
                        <img src="${w.pic}">
                        <div>
                            <h3 style="margin:0">${w.name}</h3>
                            <span style="color:var(--primary); font-size:12px">Баланс: $${salary}</span>
                        </div>
                    </div>
                    <div class="cal-strip">${this.renderCal(w.name, logs)}</div>
                </div>
            `;
        }).join('');
    },

    renderCal(name, logs) {
        let h = '';
        for(let i=1; i<=31; i++) {
            const d = `2026-04-${String(i).padStart(2,'0')}`; // Пример на апрель
            const ok = logs.some(l => l.name === name && l.date === d);
            h += `<div class="day-node ${ok?'present':''}" onclick="ent.manualLog('${name}','${d}',${ok})">${i}</div>`;
        }
        return h;
    },

    async manualLog(name, date, ok) {
        const tx = db.transaction("logs", "readwrite");
        const store = tx.objectStore("logs");
        if(ok) {
            store.openCursor().onsuccess = e => {
                const c = e.target.result;
                if(c) { if(c.value.name === name && c.value.date === date) c.delete(); c.continue(); }
            };
        } else { store.add({name, date}); }
        setTimeout(() => this.openAdmin(), 200);
    },

    async register() {
        const n = document.getElementById('reg-name').value;
        const s = document.getElementById('reg-salary').value;
        const f = document.getElementById('reg-file').files[0];
        if(!n || !f) return alert("Заполните данные!");

        const img = await faceapi.bufferToImage(f);
        const det = await faceapi.detectSingleFace(img, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptor();
        
        if(det) {
            const r = new FileReader(); r.readAsDataURL(f);
            r.onload = () => {
                db.transaction("workers", "readwrite").objectStore("workers").put({
                    name: n, salary: parseInt(s), desc: Array.from(det.descriptor), pic: r.result
                });
                this.toggleModal(false); this.openAdmin();
            };
        } else alert("Лицо не найдено!");
    },

    switch(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); },
    toggleModal(s) { document.getElementById('modal').classList.toggle('active', s); },
    getStore(n) { return new Promise(r => db.transaction(n).objectStore(n).getAll().onsuccess = e => r(e.target.result)); }
};

window.onload = () => ent.init();
</script>
</body>
</html>
